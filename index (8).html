<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ace Blend · Ads Intel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/[email protected]/dist/xlsx.full.min.js"></script>
<style>
:root {
  --ink: #0A0E2E;
  --ink-soft: #3B4068;
  --ink-mute: #6B7396;
  --line: #E5E7EB;
  --line-soft: #F1F3F5;
  --cream: #FAF7F2;
  --paper: #FFFFFF;
  /* RB2F brand palette */
  --pink: #ED3D63;        /* Paradise Pink (primary)  */
  --orchid: #8D3FD0;      /* Dark Orchid               */
  --electric: #009FF7;    /* Rich Electric Blue        */
  --blue: #223CCF;        /* Palatinate Blue           */
  --midnight: #161B7F;    /* Midnight Blue             */
  --green: #16A34A;
  --amber: #F59E0B;
  --red: #DC2626;
  --tint-blue: #DBEAFE;
  --tint-purple: #EDE9FE;
  --tint-green: #DCFCE7;
  --tint-orange: #FED7AA;
  --tint-pink: #FCE7F3;
  --tint-cyan: #CFFAFE;
  --tint-amber: #FEF3C7;
  --tint-rose: #FFE4E6;
  /* RB2F brand typefaces */
  --serif: 'Source Serif 4', Georgia, serif;
  --sans: 'Inter', system-ui, -apple-system, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--cream);
  color: var(--ink);
  font-family: var(--sans);
  font-feature-settings: "ss01", "cv05";
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ===== Header ===== */
.app-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--paper);
  border-bottom: 1px solid var(--line);
  padding: 14px 32px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.header-brand {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-right: 18px;
}
.rb2f-mark {
  font-family: var(--sans);
  font-weight: 900;
  font-size: 16px;
  letter-spacing: -0.03em;
  color: var(--pink);
  line-height: 1;
  display: inline-flex;
  align-items: center;
}
.rb2f-dot {
  display: inline-block;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--pink);
  margin-left: 3px;
  margin-bottom: 1px;
}
.header-sep {
  width: 1px;
  height: 22px;
  background: var(--line);
}
.wordmark {
  font-family: var(--serif);
  font-weight: 700;
  font-size: 22px;
  letter-spacing: -0.02em;
  color: var(--ink);
  display: flex;
  align-items: baseline;
  gap: 8px;
  white-space: nowrap;
}
.wordmark .brand { color: var(--ink); }
.wordmark .product { color: var(--ink-mute); font-weight: 500; font-size: 16px; letter-spacing: 0; font-style: italic; }

.tabs { display: flex; align-items: center; gap: 2px; flex: 1; flex-wrap: wrap; }
.tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: 8px;
  font-weight: 600;
  font-size: 14px;
  color: var(--ink-soft);
  cursor: pointer;
  border: none;
  background: transparent;
  font-family: inherit;
  transition: background .15s ease, color .15s ease;
  white-space: nowrap;
}
.tab:hover { background: var(--line-soft); color: var(--ink); }
.tab.active { color: var(--pink); }
.tab .icon { font-size: 14px; line-height: 1; }

.btn-upload {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: var(--paper);
  color: var(--ink);
  border: 1px solid var(--line);
  border-radius: 8px;
  font-family: inherit;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  transition: border-color .15s ease, transform .15s ease;
}
.btn-upload:hover { border-color: var(--ink-soft); }
.btn-upload:active { transform: scale(0.98); }

.btn-export {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  margin-left: 8px;
  background: var(--pink);
  color: #fff;
  border: 1px solid var(--pink);
  border-radius: 8px;
  font-family: inherit;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  transition: filter .15s ease, transform .15s ease;
}
.btn-export:hover { filter: brightness(0.94); }
.btn-export:active { transform: scale(0.98); }
.btn-export:disabled { opacity: 0.7; cursor: wait; }

/* ===== Date strip ===== */
.date-strip {
  background: var(--paper);
  border-bottom: 1px solid var(--line);
  padding: 10px 32px;
  display: flex;
  align-items: center;
  gap: 24px;
  font-size: 12.5px;
}
.date-pair {
  display: flex;
  align-items: center;
  gap: 8px;
}
.date-pair .label {
  color: var(--ink-mute);
  font-weight: 600;
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 0.04em;
}
.date-pair .pill {
  background: var(--cream);
  padding: 4px 10px;
  border-radius: 6px;
  font-weight: 600;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  border: 1px solid var(--line-soft);
}

/* ===== Main content ===== */
.main { padding: 28px 32px 80px; max-width: 1600px; margin: 0 auto; }
.tab-content { display: none; }
.tab-content.active { display: block; animation: fadeIn .25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

/* ===== KPI Cards ===== */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}
.kpi-card {
  background: var(--paper);
  border-radius: 18px;
  padding: 22px 24px;
  position: relative;
  overflow: hidden;
  border: 1px solid var(--line-soft);
}
.kpi-card.tint-blue { background: linear-gradient(145deg, #EFF4FF 0%, #DBEAFE 100%); border-color: #C7DAF8; }
.kpi-card.tint-purple { background: linear-gradient(145deg, #F5F3FF 0%, #EDE9FE 100%); border-color: #DDD6FE; }
.kpi-card.tint-green { background: linear-gradient(145deg, #F0FDF4 0%, #DCFCE7 100%); border-color: #BBF7D0; }
.kpi-card.tint-orange { background: linear-gradient(145deg, #FFF7ED 0%, #FED7AA 100%); border-color: #FDBA74; }
.kpi-card.tint-pink { background: linear-gradient(145deg, #FFF1F2 0%, #FFE4E6 100%); border-color: #FECDD3; }
.kpi-card.tint-cyan { background: linear-gradient(145deg, #ECFEFF 0%, #CFFAFE 100%); border-color: #A5F3FC; }

.kpi-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 14px;
}
.kpi-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.kpi-card.tint-blue .kpi-title { color: var(--blue); }
.kpi-card.tint-purple .kpi-title { color: var(--orchid); }
.kpi-card.tint-green .kpi-title { color: var(--green); }
.kpi-card.tint-orange .kpi-title { color: #B45309; }
.kpi-card.tint-pink .kpi-title { color: var(--pink); }
.kpi-card.tint-cyan .kpi-title { color: #0E7490; }

.kpi-arrow {
  color: var(--ink-mute);
  opacity: 0.4;
  font-size: 12px;
}

.delta-pill {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  margin-bottom: 6px;
}
.delta-pill.good { background: rgba(22,163,74,0.12); color: var(--green); }
.delta-pill.bad { background: rgba(237,61,99,0.12); color: var(--pink); }
.delta-pill.neutral { background: var(--line-soft); color: var(--ink-mute); }

.kpi-hero {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 44px;
  line-height: 1.05;
  letter-spacing: -0.02em;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  margin-bottom: 16px;
}

.kpi-secondary {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  padding-top: 14px;
  border-top: 1px solid rgba(10,14,46,0.07);
}
.kpi-secondary .item .label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-mute);
  margin-bottom: 2px;
}
.kpi-secondary .item .value {
  font-size: 14px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  color: var(--ink-soft);
}

/* ===== Section blocks ===== */
.section {
  background: var(--paper);
  border-radius: 18px;
  padding: 24px 28px;
  margin-bottom: 24px;
  border: 1px solid var(--line-soft);
}
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}
.section-title {
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink);
}
.section-subtitle {
  font-size: 11px;
  color: var(--ink-mute);
  font-weight: 500;
}
.title-em-rule::before, .title-em-rule::after {
  content: "—";
  color: var(--ink-mute);
  margin: 0 8px;
  font-weight: 400;
}

/* ===== Filter bar ===== */
.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  align-items: center;
  flex-wrap: wrap;
}
.filter-bar select, .filter-bar input[type="text"] {
  padding: 8px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--paper);
  font-family: inherit;
  font-size: 13px;
  color: var(--ink);
  cursor: pointer;
  font-weight: 500;
}
.filter-bar input[type="text"] {
  flex: 1;
  min-width: 200px;
  cursor: text;
}
.filter-bar .reset-btn {
  padding: 8px 16px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 8px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  color: var(--ink-soft);
}
.filter-bar .reset-btn:hover { background: var(--line-soft); }
.filter-bar .summary {
  margin-left: auto;
  font-size: 12px;
  color: var(--ink-mute);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}

/* ===== Data table ===== */
.dt-wrap {
  overflow-x: auto;
  border-radius: 12px;
  border: 1px solid var(--line-soft);
}
table.dt {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  font-variant-numeric: tabular-nums;
}
table.dt thead { background: var(--line-soft); }
table.dt th {
  padding: 10px 12px;
  text-align: left;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-soft);
  border-bottom: 1px solid var(--line);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}
table.dt th.sortable:hover { color: var(--ink); }
table.dt th .sort-i {
  display: inline-block;
  font-size: 9px;
  color: var(--ink-mute);
  opacity: 0.5;
  margin-left: 4px;
}
table.dt th.sorted .sort-i { opacity: 1; color: var(--pink); }
table.dt th.num, table.dt td.num { text-align: right; }
table.dt th.center, table.dt td.center { text-align: center; }
table.dt td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--line-soft);
  color: var(--ink);
}
table.dt tbody tr:hover { background: rgba(34,60,207,0.02); cursor: default; }
table.dt tbody tr.clickable { cursor: pointer; }
table.dt tbody tr.clickable:hover { background: rgba(34,60,207,0.05); }
table.dt tfoot td { padding: 12px; font-weight: 800; background: var(--line-soft); border-top: 2px solid var(--ink); }
table.dt .header-group {
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  color: var(--ink-mute);
  border-bottom: 1px solid var(--line);
  padding: 6px;
}

/* Pills inside table */
.pill {
  display: inline-flex;
  align-items: center;
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.01em;
  white-space: nowrap;
}
.pill.sm { padding: 2px 7px; font-size: 10px; }

.cat-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 999px;
  margin-right: 8px;
  vertical-align: middle;
}
.cat-row { display: inline-flex; align-items: center; gap: 6px; font-weight: 600; }
.cat-row .arrow { color: var(--ink-mute); opacity: 0.5; transition: opacity .15s; }
tr.clickable:hover .cat-row .arrow { opacity: 1; }

.delta-cell {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.delta-cell.good { color: var(--green); }
.delta-cell.bad { color: var(--pink); }
.delta-cell.zero { color: var(--ink-mute); }

.bleeder-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 999px;
  margin-right: 6px;
  vertical-align: middle;
  background: var(--pink);
  box-shadow: 0 0 0 2px rgba(237,61,99,0.18);
}
.watch-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 999px;
  margin-right: 6px;
  vertical-align: middle;
  background: var(--amber);
  box-shadow: 0 0 0 2px rgba(245,158,11,0.18);
}

.acos-pill.good   { background: rgba(22,163,74,0.14);  color: #15803D; }
.acos-pill.ok     { background: rgba(245,158,11,0.18); color: #B45309; }
.acos-pill.warn   { background: rgba(249,115,22,0.18); color: #C2410C; }
.acos-pill.bad    { background: rgba(237,61,99,0.16);  color: #BE123C; }

/* Loader */
#loader {
  position: fixed; inset: 0;
  background: var(--cream);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
  font-family: var(--serif);
  font-size: 28px;
  letter-spacing: -0.02em;
  color: var(--ink);
}
#loader .dots::after {
  content: "...";
  animation: dots 1.4s infinite steps(4);
}
@keyframes dots {
  0% { content: ""; }
  25% { content: "."; }
  50% { content: ".."; }
  75% { content: "..."; }
}

/* Mini bar charts (used on Bleed Detector etc.) */
.mini-bar-list { display: flex; flex-direction: column; gap: 7px; }
.mini-bar {
  display: grid;
  grid-template-columns: 110px 1fr 70px;
  align-items: center;
  gap: 12px;
  font-size: 12px;
}
.mini-bar .label { color: var(--ink-soft); font-weight: 600; }
.mini-bar .track {
  background: var(--line-soft);
  border-radius: 999px;
  height: 8px;
  overflow: hidden;
  position: relative;
}
.mini-bar .fill {
  height: 100%;
  border-radius: 999px;
  transition: width .4s ease;
}
.mini-bar .val { text-align: right; font-weight: 700; font-variant-numeric: tabular-nums; }

/* ===== Modal overlay & cards ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10, 14, 46, 0.45);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 60px 24px 40px;
  z-index: 1000;
  opacity: 0;
  transition: opacity .2s ease;
  overflow-y: auto;
}
.modal-overlay.open { opacity: 1; }
.modal-card {
  background: var(--paper);
  border-radius: 22px;
  width: 100%;
  max-width: 1240px;
  padding: 36px 40px 32px;
  position: relative;
  box-shadow: 0 30px 80px rgba(10,14,46,0.25);
  transform: translateY(8px);
  transition: transform .25s ease;
  margin-bottom: 40px;
}
.modal-overlay.open .modal-card { transform: translateY(0); }
.modal-close {
  position: absolute;
  top: 22px;
  right: 22px;
  background: transparent;
  border: none;
  font-size: 26px;
  color: var(--ink-mute);
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 8px;
  line-height: 1;
  transition: background .15s ease, color .15s ease;
}
.modal-close:hover { background: var(--line-soft); color: var(--ink); }
.modal-head { margin-bottom: 24px; padding-right: 50px; }
.modal-title {
  font-family: var(--serif);
  font-weight: 700;
  font-size: 26px;
  letter-spacing: -0.02em;
  color: var(--ink);
  margin: 0 0 6px;
}
.modal-subtitle { font-size: 13px; color: var(--ink-mute); }

/* KPI cards become clickable */
.kpi-card { cursor: pointer; transition: transform .15s ease, box-shadow .15s ease; }
.kpi-card:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(10,14,46,0.08); }

/* ===== Breakdown view ===== */
.breakdown-chart-wrap {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 36px;
  align-items: center;
  margin-bottom: 28px;
}
.donut-wrap { position: relative; height: 200px; }
.donut-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.donut-center .dc-label {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.donut-center .dc-val {
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 600;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.donut-legend {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px 18px;
}
.legend-row {
  display: grid;
  grid-template-columns: 16px 1fr auto;
  align-items: center;
  font-size: 13px;
  gap: 8px;
}
.legend-name { color: var(--ink); font-weight: 600; }
.legend-val { color: var(--ink-soft); font-weight: 700; font-variant-numeric: tabular-nums; font-family: var(--mono); font-size: 12px; }

.ranked-list-head {
  font-size: 12px;
  color: var(--ink-mute);
  font-weight: 600;
  margin-bottom: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line-soft);
}
.ranked-list { display: flex; flex-direction: column; gap: 4px; }
.ranked-row {
  display: grid;
  grid-template-columns: 36px 130px 1fr 80px 16px;
  align-items: center;
  gap: 14px;
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: background .15s ease;
}
.ranked-row:hover { background: var(--line-soft); }
.rank-num { font-family: var(--mono); font-size: 14px; font-weight: 700; }
.rank-cat { font-weight: 600; color: var(--ink); font-size: 14px; }
.rank-bar { position: relative; height: 28px; background: var(--line-soft); border-radius: 8px; overflow: hidden; }
.rank-bar-fill {
  position: absolute;
  inset: 0 auto 0 0;
  display: flex;
  align-items: center;
  padding-left: 10px;
  font-weight: 700;
  font-size: 12px;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  border-radius: 8px;
  min-width: 4px;
  transition: width .4s cubic-bezier(.4,0,.2,1);
}
.rank-bar-fill .rank-bar-val { white-space: nowrap; }
.rank-delta { text-align: right; font-weight: 700; font-size: 12.5px; font-variant-numeric: tabular-nums; }
.rank-arrow { color: var(--ink-mute); font-size: 16px; opacity: 0.5; }
.ranked-row:hover .rank-arrow { opacity: 1; color: var(--pink); }

/* ===== ASIN Drilldown ===== */
.mini-kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}
.mini-kpi {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 16px 18px;
}
.mini-kpi-title {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-soft);
  padding-bottom: 10px;
  border-bottom: 1px solid var(--line-soft);
  margin-bottom: 12px;
}
.mini-kpi-grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px 18px;
}
.mini-kpi-pair .mkp-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  margin-bottom: 4px;
}
.mini-kpi-pair .mkp-val {
  font-family: var(--serif);
  font-weight: 600;
  font-size: 22px;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.01em;
}
.mini-kpi-pair .mkp-val.mute { color: var(--ink-mute); font-size: 18px; font-weight: 500; }

/* ASIN pill links */
.asin-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 9px;
  border-radius: 7px;
  background: var(--tint-cyan);
  color: #0E7490;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  text-decoration: none;
  transition: background .12s ease, transform .12s ease;
  letter-spacing: 0.02em;
}
.asin-pill:hover { background: #A5F3FC; transform: translateY(-1px); }
.asin-pill .asin-arrow { font-size: 10px; opacity: 0.6; }
.asin-title { color: var(--ink-soft); font-size: 12.5px; max-width: 280px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }


/* ===== Tooltips (JS-positioned floating element) ===== */
[data-tip] { cursor: default; }
.tt-float {
  position: fixed;
  background: var(--ink);
  color: #fff;
  padding: 9px 13px;
  border-radius: 9px;
  font-size: 11.5px;
  font-weight: 500;
  font-family: var(--sans);
  letter-spacing: 0;
  text-transform: none;
  white-space: pre-line;
  max-width: 280px;
  text-align: left;
  line-height: 1.45;
  box-shadow: 0 14px 36px rgba(0,0,0,0.28);
  z-index: 9999;
  pointer-events: none;
  opacity: 0;
  transition: opacity .12s ease;
  display: none;
}
.tt-float.show { opacity: 1; }
table.dt th[data-tip] { overflow: visible; }
.info-i {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 13px; height: 13px;
  border-radius: 999px;
  border: 1px solid currentColor;
  font-size: 9px;
  font-weight: 800;
  font-family: var(--sans);
  cursor: help;
  opacity: 0.5;
  margin-left: 4px;
  vertical-align: middle;
  line-height: 1;
  font-style: normal;
}
.info-i:hover { opacity: 1; }

/* ===== View toggle (MoM / WoW) ===== */
.section-toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
}
.section-toolbar .label {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.view-toggle {
  display: inline-flex;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 10px;
  overflow: hidden;
  padding: 3px;
}
.view-toggle button {
  padding: 6px 14px;
  background: transparent;
  border: none;
  font-family: inherit;
  font-size: 12.5px;
  font-weight: 700;
  color: var(--ink-soft);
  cursor: pointer;
  border-radius: 7px;
  transition: background .15s ease, color .15s ease;
}
.view-toggle button.active {
  background: var(--ink);
  color: #fff;
}
.view-toggle button:not(.active):hover { background: var(--line-soft); color: var(--ink); }

/* ===== Sortable headers ===== */
table.dt th.sortable { cursor: pointer; user-select: none; position: relative; }
table.dt th.sortable .sort-arr {
  display: inline-block;
  margin-left: 4px;
  font-size: 9px;
  opacity: 0.3;
  vertical-align: middle;
  transition: opacity .12s, color .12s;
}
table.dt th.sortable:hover .sort-arr { opacity: 0.7; }
table.dt th.sortable[data-sort-dir="asc"]  .sort-arr,
table.dt th.sortable[data-sort-dir="desc"] .sort-arr { opacity: 1; color: var(--pink); }

/* ===== Contribution dual-cell ===== */
.contrib-cell {
  display: inline-flex;
  align-items: baseline;
  gap: 4px;
  font-variant-numeric: tabular-nums;
  font-size: 12px;
  font-family: var(--mono);
  font-weight: 700;
  white-space: nowrap;
}
.contrib-cell .ct-total { color: #1D4ED8; }
.contrib-cell .ct-sep   { color: var(--ink-mute); opacity: 0.6; font-weight: 400; }
.contrib-cell .ct-ad    { color: var(--orchid); }

/* Hero KPI in WoW mode (visual differentiation) */
.kpi-card.view-wow { box-shadow: inset 0 0 0 1.5px rgba(34,60,207,0.18); }

/* Contribution mini-bar inside KPI card */
.kpi-contrib {
  margin-top: 6px;
  padding-top: 8px;
  border-top: 1px solid rgba(10,14,46,0.07);
  font-size: 11px;
  color: var(--ink-soft);
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}
.kpi-contrib .ck { font-family: var(--mono); font-weight: 700; }


/* ===== Bleed Detector strip cards ===== */
.bleed-strip {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 10px;
  margin-bottom: 28px;
}
.bleed-card {
  background: linear-gradient(150deg, #0F1232 0%, #161B7F 100%);
  color: #fff;
  border-radius: 14px;
  padding: 18px 18px 16px;
  position: relative;
}
.bleed-card .bc-title {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.7);
  margin-bottom: 10px;
  line-height: 1.35;
  display: flex;
  align-items: center;
  gap: 4px;
}
.bleed-card .bc-title .info-i { color: rgba(255,255,255,0.6); border-color: rgba(255,255,255,0.6); }
.bleed-card .bc-hero {
  font-family: var(--serif);
  font-weight: 600;
  font-size: 28px;
  line-height: 1.1;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
  margin-bottom: 6px;
  color: #fff;
}
.bleed-card .bc-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.6);
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}
@media (max-width: 1200px) {
  .bleed-strip { grid-template-columns: repeat(4, 1fr); }
}

/* ===== Mini-chart grid (Bleed Detector distribution) ===== */
.mini-chart-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
}
.mini-chart {
  background: var(--cream);
  border: 1px solid var(--line-soft);
  border-radius: 14px;
  padding: 18px 20px;
}
.mini-chart-title {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 14px;
}


/* ===== Recon tab ===== */
.recon-rows { display: flex; flex-direction: column; }
.recon-row {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  padding: 14px 4px;
  border-bottom: 1px solid var(--line-soft);
  font-size: 14px;
}
.recon-row .rr-label { color: var(--ink); font-weight: 500; }
.recon-row .rr-value {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  color: var(--ink);
}
.recon-row .rr-value.rr-strong { font-weight: 700; }
.recon-row.rr-divider { border-top: 2px solid var(--ink); margin-top: 4px; padding-top: 14px; border-bottom: 1px solid var(--line); }
.recon-banner {
  margin-top: 18px;
  padding: 14px;
  border-radius: 12px;
  text-align: center;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 0.01em;
}
.recon-banner.ok  { background: rgba(22,163,74,0.10); color: var(--green); border: 1px solid rgba(22,163,74,0.25); }
.recon-banner.bad { background: rgba(237,61,99,0.08); color: var(--pink); border: 1px solid rgba(237,61,99,0.22); }

/* ===== Phase 3+4 minor tweaks ===== */
.section-toolbar .view-toggle button[data-metric] { padding: 5px 10px; font-size: 12px; }


/* ===== V4: dual delta layout ===== */
.dual-delta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
.delta-pill .dp-label {
  font-size: 8.5px;
  letter-spacing: 0.06em;
  font-weight: 700;
  opacity: 0.6;
  margin-right: 4px;
  text-transform: uppercase;
}

/* ===== V4: totals row at TOP of tables ===== */
table.dt tbody tr.subtotal-top td {
  background: #0F1232 !important;
  color: #fff !important;
  font-weight: 700 !important;
  border-bottom: 2px solid #0F1232 !important;
  border-top: none !important;
  padding-top: 12px !important;
  padding-bottom: 12px !important;
  font-size: 12.5px !important;
}
table.dt tbody tr.subtotal-top td.num {
  font-variant-numeric: tabular-nums !important;
}
table.dt tbody tr.subtotal-top td .delta-cell { color: #FCA5A5 !important; }
table.dt tbody tr.subtotal-top td .delta-cell.good { color: #86EFAC !important; }
table.dt tbody tr.subtotal-top td .pill { background: rgba(255,255,255,0.12) !important; color: #fff !important; }
table.dt tbody tr.subtotal-top td .contrib-cell .ct-total,
table.dt tbody tr.subtotal-top td .contrib-cell .ct-ad,
table.dt tbody tr.subtotal-top td .contrib-cell .ct-sep { color: #fff !important; }
table.dt tbody tr.subtotal-top td .cat-dot { display: none; }

/* ===== V4: landing overlay ===== */
.landing-overlay {
  position: fixed; inset: 0;
  background: linear-gradient(160deg, var(--cream) 0%, #F5F1E8 100%);
  display: flex; align-items: center; justify-content: center;
  z-index: 5000;
  padding: 24px;
  animation: lo-fade .3s ease;
}
.landing-overlay.closing { animation: lo-fade-out .25s ease forwards; }
@keyframes lo-fade { from { opacity: 0; } to { opacity: 1; } }
@keyframes lo-fade-out { from { opacity: 1; } to { opacity: 0; } }
.landing-card {
  background: var(--paper);
  border-radius: 24px;
  padding: 48px 52px 36px;
  max-width: 520px;
  width: 100%;
  box-shadow: 0 30px 80px rgba(10,14,46,0.10);
  text-align: center;
  border: 1px solid var(--line-soft);
}
.landing-brand-mark {
  font-family: var(--sans);
  font-weight: 900;
  font-size: 28px;
  letter-spacing: -0.04em;
  color: var(--pink);
  line-height: 1;
  margin-bottom: 12px;
}
.landing-brand-mark::after {
  content: '';
  display: inline-block;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--pink);
  margin-left: 4px;
  margin-bottom: 4px;
  vertical-align: middle;
}
.landing-brand {
  font-family: var(--serif);
  display: flex;
  align-items: baseline;
  gap: 10px;
  justify-content: center;
  margin-bottom: 6px;
}
.landing-brand-name { font-weight: 700; font-size: 26px; letter-spacing: -0.015em; }
.landing-brand-product { font-weight: 500; font-size: 17px; color: var(--ink-mute); font-style: italic; }
.landing-sub { color: var(--ink-mute); margin: 0 0 28px; font-size: 13.5px; font-weight: 500; }
.landing-options {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 22px;
}
.landing-opt {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 20px;
  border: 2px solid var(--line);
  border-radius: 14px;
  background: var(--paper);
  cursor: pointer;
  text-align: left;
  font-family: inherit;
  transition: border-color .15s ease, transform .15s ease, box-shadow .15s ease;
  color: var(--ink);
}
.landing-opt:hover { border-color: var(--pink); transform: translateY(-2px); box-shadow: 0 12px 28px rgba(237,61,99,0.10); }
.landing-opt.primary { background: var(--pink); color: white; border-color: var(--pink); }
.landing-opt.primary:hover { background: var(--pink); filter: brightness(0.95); box-shadow: 0 12px 28px rgba(237,61,99,0.30); }
.landing-opt .opt-icon { font-size: 26px; flex-shrink: 0; }
.landing-opt .opt-title { font-weight: 700; font-size: 15.5px; }
.landing-opt .opt-desc { font-size: 12px; opacity: 0.75; margin-top: 2px; }
.landing-opt.primary .opt-desc { opacity: 0.85; }
.landing-foot {
  font-size: 11px;
  color: var(--ink-mute);
  margin: 0;
  opacity: 0.8;
}

/* ===== V4: mini bars with % column ===== */
.mini-bar.with-pct {
  grid-template-columns: 110px 1fr 70px 50px;
}
.mini-bar .pct {
  text-align: right;
  font-size: 11px;
  font-weight: 700;
  font-family: var(--mono);
  color: var(--ink-mute);
  font-variant-numeric: tabular-nums;
}

/* ===== V4: clickable card hint ===== */
.kpi-card[data-metric]:hover,
.bleed-card[data-state]:hover,
.bleed-card[data-metric]:hover {
  cursor: pointer;
}
.bleed-card[data-state],
.bleed-card[data-metric] {
  cursor: pointer;
  transition: transform .15s ease, box-shadow .15s ease;
}
.bleed-card[data-state]:hover,
.bleed-card[data-metric]:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 24px rgba(15,18,50,0.30);
}
.bleed-card .bc-hint {
  font-size: 10px;
  color: rgba(255,255,255,0.45);
  margin-top: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 700;
}

/* ===== V4: info banner ===== */
.info-banner {
  background: linear-gradient(95deg, #EFF6FF, #DBEAFE);
  border: 1px solid #BFDBFE;
  border-left: 4px solid #2563EB;
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 20px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.info-banner .ib-icon { font-size: 22px; flex-shrink: 0; }
.info-banner .ib-title { font-weight: 700; font-size: 13.5px; color: #1E40AF; margin-bottom: 2px; }
.info-banner .ib-body { font-size: 12.5px; color: var(--ink-soft); line-height: 1.55; }
.info-banner code { background: rgba(30,64,175,0.10); padding: 1px 6px; border-radius: 4px; font-size: 11.5px; }

</style>

<div id="loader"><span>Loading Ace Blend Ads Intel<span class="dots"></span></span></div>

<script>
// ============================================================

// The most recently loaded raw columnar payload (kept so we can re-export)
let lastRaw = null;

// --- Decompression: base64 → gzipped bytes → JSON ---
async function decodeEmbedded() {
  const bin = atob(DATA_B64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const ds = new DecompressionStream('gzip');
  const stream = new Blob([bytes]).stream().pipeThrough(ds);
  const decoded = await new Response(stream).text();
  return JSON.parse(decoded);
}

// --- Columnar → row-form converter (called once on load) ---
function columnarToRows(sheet) {
  if (!sheet || !sheet.c) return [];
  const { c, r } = sheet;
  return r.map(row => {
    const o = {};
    for (let i = 0; i < c.length; i++) {
      if (row[i] !== null && row[i] !== undefined) o[c[i]] = row[i];
    }
    return o;
  });
}

// --- Global data store ---
const DS = {
  asinMapper: [],           // 1 row per ASIN
  asinByAsin: new Map(),    // ASIN -> mapper row
  campMapper: [],
  campByName: new Map(),    // Campaign -> mapper row
  sbvMapper: [],
  sbvByCamp: new Map(),
  ce: { mtd: [], pmtd: [], l7d: [], p7d: [] },
  spStr: { mtd: [], pmtd: [] },
  sbStr: { mtd: [], pmtd: [] },
  spAsin: { mtd: [], pmtd: [] },
  sdAsin: { mtd: [], pmtd: [] },
  placement: { mtd: [], pmtd: [] },
  br: { mtd: [], pmtd: [], l7d: [], p7d: [] },
  meta: {},
  windows: {},              // { MTD: { start, end }, PMTD: ..., L7D: ..., P7D: ... }
};

function ingestData(raw) {
  lastRaw = raw;  // keep for export
  DS.meta = raw._meta || {};
  DS.asinMapper = columnarToRows(raw.ASIN_MAPPER);
  DS.asinByAsin = new Map(DS.asinMapper.map(r => [r.asin, r]));
  DS.campMapper = columnarToRows(raw.CAMPAIGN_MAPPER);
  DS.campByName = new Map(DS.campMapper.map(r => [r.cn, r]));
  DS.sbvMapper = columnarToRows(raw.SBV_MAPPER) || [];
  DS.sbvByCamp = new Map(DS.sbvMapper.map(r => [r.cn, r]));
  DS.ce.mtd = columnarToRows(raw.CE_MTD);
  DS.ce.pmtd = columnarToRows(raw.CE_PMTD);
  DS.ce.l7d = columnarToRows(raw.CE_L7D);
  DS.ce.p7d = columnarToRows(raw.CE_P7D);
  DS.spStr.mtd = columnarToRows(raw.SP_STR_IS_MTD);
  DS.spStr.pmtd = columnarToRows(raw.SP_STR_IS_PMTD);
  DS.sbStr.mtd = columnarToRows(raw.SB_STR_IS_MTD);
  DS.sbStr.pmtd = columnarToRows(raw.SB_STR_IS_PMTD);
  DS.spAsin.mtd = columnarToRows(raw.SP_ASIN_MTD);
  DS.spAsin.pmtd = columnarToRows(raw.SP_ASIN_PMTD);
  DS.sdAsin.mtd = columnarToRows(raw.SD_ASIN_MTD);
  DS.sdAsin.pmtd = columnarToRows(raw.SD_ASIN_PMTD);
  DS.placement.mtd = columnarToRows(raw.PLACEMENT_MTD);
  DS.placement.pmtd = columnarToRows(raw.PLACEMENT_PMTD);
  DS.br.mtd = columnarToRows(raw.BR_MTD);
  DS.br.pmtd = columnarToRows(raw.BR_PMTD);
  DS.br.l7d = columnarToRows(raw.BR_L7D);
  DS.br.p7d = columnarToRows(raw.BR_P7D);
  computeDateWindows();
}

function computeDateWindows() {
  // From STR sheets, infer report start/end per window
  function detect(records) {
    let starts = new Set(), ends = new Set();
    for (const r of records) {
      const sd = r.sd || r['Start Date'];
      const ed = r.ed || r['End Date'];
      if (sd) starts.add(sd);
      if (ed) ends.add(ed);
    }
    starts = [...starts].sort();
    ends = [...ends].sort();
    return { start: starts[0] || null, end: ends[ends.length - 1] || null };
  }
  DS.windows.MTD = detect(DS.spStr.mtd);
  DS.windows.PMTD = detect(DS.spStr.pmtd);
  // L7D/P7D: BR doesn't store dates; infer 7-day windows ending on MTD end
  if (DS.windows.MTD && DS.windows.MTD.end) {
    const endDate = new Date(DS.windows.MTD.end);
    const l7dStart = new Date(endDate); l7dStart.setDate(endDate.getDate() - 6);
    const p7dEnd = new Date(l7dStart); p7dEnd.setDate(l7dStart.getDate() - 1);
    const p7dStart = new Date(p7dEnd); p7dStart.setDate(p7dEnd.getDate() - 6);
    DS.windows.L7D = { start: l7dStart.toISOString().slice(0,10), end: endDate.toISOString().slice(0,10) };
    DS.windows.P7D = { start: p7dStart.toISOString().slice(0,10), end: p7dEnd.toISOString().slice(0,10) };
  } else {
    DS.windows.L7D = { start: null, end: null };
    DS.windows.P7D = { start: null, end: null };
  }
}

// ============================================================
// FORMATTERS
// ============================================================
function fmtINR(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  if (v === 0) return '₹0';
  const a = Math.abs(v);
  const sign = v < 0 ? '-' : '';
  if (a >= 1e7)  return sign + '₹' + (a/1e7).toFixed(2) + 'Cr';
  if (a >= 1e5)  return sign + '₹' + (a/1e5).toFixed(2) + 'L';
  if (a >= 1e3)  return sign + '₹' + (a/1e3).toFixed(1) + 'K';
  return sign + '₹' + a.toFixed(0);
}
function fmtNum(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  if (v === 0) return '0';
  const a = Math.abs(v);
  const sign = v < 0 ? '-' : '';
  if (a >= 1e7) return sign + (a/1e7).toFixed(2) + 'Cr';
  if (a >= 1e5) return sign + (a/1e5).toFixed(2) + 'L';
  if (a >= 1e3) return sign + (a/1e3).toFixed(1) + 'K';
  return sign + a.toFixed(0);
}
function fmtPct(v, decimals = 2) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  // Source data uses decimal form (0.5 = 50%). Most numbers come like 0.6486
  return (v * 100).toFixed(decimals) + '%';
}
function fmtPctRaw(v, decimals = 1) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  return v.toFixed(decimals) + '%';
}
function fmtDateRange(w) {
  if (!w || !w.start) return '—';
  function pretty(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
  }
  const s = pretty(w.start);
  const e = w.end ? pretty(w.end) : '';
  return e ? s + ' – ' + e : s;
}

function deltaPct(mtd, pmtd) {
  if (pmtd === null || pmtd === undefined || pmtd === 0) return null;
  if (mtd === null || mtd === undefined) return null;
  return (mtd - pmtd) / Math.abs(pmtd);
}

// Direction-aware delta:
//   metric "good_up" (sales, units, sessions): up=green, down=red
//   metric "good_down" (spend, ACOS, CPC): up=red, down=green
function fmtDeltaPill(d, semantic = 'good_up') {
  if (d === null || d === undefined || isNaN(d)) return '<span class="delta-pill neutral">—</span>';
  const sign = d >= 0 ? '↑' : '↓';
  const isUp = d >= 0;
  let cls;
  if (semantic === 'good_up')   cls = isUp ? 'good' : 'bad';
  else                          cls = isUp ? 'bad'  : 'good';
  if (Math.abs(d) < 0.001) cls = 'neutral';
  return `<span class="delta-pill ${cls}">${sign} ${(Math.abs(d)*100).toFixed(1)}%</span>`;
}

function fmtDeltaCell(d, semantic = 'good_up') {
  if (d === null || d === undefined || isNaN(d)) return '<span class="delta-cell zero">—</span>';
  if (Math.abs(d) < 0.0005) return '<span class="delta-cell zero">—</span>';
  const sign = d >= 0 ? '▲' : '▼';
  const isUp = d >= 0;
  let cls;
  if (semantic === 'good_up')   cls = isUp ? 'good' : 'bad';
  else                          cls = isUp ? 'bad'  : 'good';
  return `<span class="delta-cell ${cls}">${sign} ${(Math.abs(d)*100).toFixed(1)}%</span>`;
}

// ACOS pill bands
function acosBand(v) {
  // v is decimal (0.65 = 65%)
  if (v === null || v === undefined || isNaN(v)) return null;
  const pct = v * 100;
  if (pct < 45) return 'good';
  if (pct < 80) return 'ok';
  if (pct < 100) return 'warn';
  return 'bad';
}
function fmtAcosPill(v) {
  if (v === null || v === undefined || isNaN(v)) return '<span class="pill sm">—</span>';
  return `<span class="pill sm acos-pill ${acosBand(v)}">${(v*100).toFixed(2)}%</span>`;
}

// CR% threshold band (orange-amber tone like screenshot)
function fmtCrCell(v) {
  if (v === null || v === undefined || isNaN(v)) return '<span class="zero">—</span>';
  const pct = v * 100;

  if (pct >= 20) color = '#15803D';

  return `<span style="font-weight:700;color:${color}">${pct.toFixed(2)}%</span>`;
}

// ============================================================
// AGGREGATIONS
// ============================================================
function sumBy(rows, keyFn, agg) {
  // agg: object of {fieldName: 'sum'|'avg'|'max'|'first'}
  const groups = new Map();
  for (const r of rows) {
    const k = keyFn(r);
    if (k === null || k === undefined || k === '') continue;
    if (!groups.has(k)) groups.set(k, { _key: k, _rows: [] });
    groups.get(k)._rows.push(r);
  }
  const out = [];
  for (const g of groups.values()) {
    const o = { _key: g._key };
    for (const [field, op] of Object.entries(agg)) {
      if (op === 'sum') {
        o[field] = g._rows.reduce((s, r) => s + (Number(r[field]) || 0), 0);
      } else if (op === 'avg') {
        const vals = g._rows.map(r => Number(r[field])).filter(v => !isNaN(v));
        o[field] = vals.length ? vals.reduce((s,v)=>s+v,0) / vals.length : null;
      } else if (op === 'max') {
        o[field] = Math.max(...g._rows.map(r => Number(r[field]) || 0));
      } else if (op === 'first') {
        o[field] = g._rows[0][field];
      }
    }
    o._count = g._rows.length;
    out.push(o);
  }
  return out;
}

// Generic table sorter: looks for data-val attributes on td cells
function makeSortable(tableEl, opts = {}) {
  if (!tableEl) return;
  const tbody = tableEl.tBodies[0];
  if (!tbody) return;
  const ths = tableEl.querySelectorAll('thead th.sortable');
  ths.forEach(th => {
    if (!th.querySelector('.sort-arr')) {
      const s = document.createElement('span');
      s.className = 'sort-arr';
      s.textContent = '↕';
      th.appendChild(s);
    }
    th.addEventListener('click', () => {
      const colIdx = th.dataset.col !== undefined ? parseInt(th.dataset.col, 10)
                   : Array.from(th.parentNode.children).indexOf(th);
      const curDir = th.dataset.sortDir;
      const dir = curDir === 'desc' ? 'asc' : 'desc';
      tableEl.querySelectorAll('thead th.sortable').forEach(h => {
        h.dataset.sortDir = '';
        const arr = h.querySelector('.sort-arr');
        if (arr) arr.textContent = '↕';
      });
      th.dataset.sortDir = dir;
      th.querySelector('.sort-arr').textContent = dir === 'asc' ? '▲' : '▼';
      const rows = [...tbody.rows].filter(r => !r.classList.contains('subtotal'));
      rows.sort((a, b) => {
        const av = a.cells[colIdx];
        const bv = b.cells[colIdx];
        if (!av || !bv) return 0;
        const rawA = av.dataset.val !== undefined ? av.dataset.val : av.textContent.trim();
        const rawB = bv.dataset.val !== undefined ? bv.dataset.val : bv.textContent.trim();
        const nA = parseFloat(rawA);
        const nB = parseFloat(rawB);
        const isNum = !isNaN(nA) && !isNaN(nB);
        let cmp;
        if (isNum) cmp = nA - nB;
        else cmp = String(rawA).localeCompare(String(rawB));
        return dir === 'asc' ? cmp : -cmp;
      });
      rows.forEach(r => tbody.appendChild(r));
    });
  });
}

// Ad attribution per ASIN within a category (combines SP_ASIN + SD_ASIN)
function adAttribByAsinForCat(category, win) {
  const out = new Map();
  function add(rows) {
    for (const r of rows || []) {
      const asin = r.asin;
      if (!asin) continue;
      const meta = DS.asinByAsin.get(asin);
      if (!meta || meta.cat !== category) continue;
      if (!out.has(asin)) out.set(asin, { spend:0, sales:0, orders:0, units:0, impr:0, clicks:0 });
      const o = out.get(asin);
      o.spend  += Number(r.sp) || 0;
      o.sales  += Number(r.sl) || 0;
      o.orders += Number(r.or) || 0;
      o.units  += Number(r.un) || 0;
      o.impr   += Number(r.im) || 0;
      o.clicks += Number(r.ck) || 0;
    }
  }
  add(DS.spAsin[win]);
  add(DS.sdAsin[win]);
  return out;
}

// Ad sales total across all ASINs for a window (sum of SP + SD)
function totalAdSalesAndSpend(win) {
  let spend = 0, sales = 0;
  for (const r of (DS.spAsin[win] || [])) { spend += Number(r.sp) || 0; sales += Number(r.sl) || 0; }
  for (const r of (DS.sdAsin[win] || [])) { spend += Number(r.sp) || 0; sales += Number(r.sl) || 0; }
  return { spend, sales };
}

// Ad sales by category (sum of SP+SD per category via ASIN→category join)
function adSalesByCategory(win) {
  const out = new Map();
  function add(rows) {
    for (const r of rows || []) {
      const meta = DS.asinByAsin.get(r.asin);
      const cat = (meta && meta.cat) || 'Uncategorized';
      if (!out.has(cat)) out.set(cat, { sales: 0, spend: 0 });
      const o = out.get(cat);
      o.sales += Number(r.sl) || 0;
      o.spend += Number(r.sp) || 0;
    }
  }
  add(DS.spAsin[win]);
  add(DS.sdAsin[win]);
  return out;
}

// ============================================================
// FLOATING TOOLTIP SYSTEM (viewport-aware, auto-flip + clamp)
// ============================================================
(function setupTooltips() {
  let tipEl = null;
  let currentTarget = null;
  let hideTimer = null;

  function ensureEl() {
    if (tipEl) return tipEl;
    tipEl = document.createElement('div');
    tipEl.className = 'tt-float';
    document.body.appendChild(tipEl);
    return tipEl;
  }

  function show(target) {
    const tip = target.getAttribute('data-tip');
    if (!tip) return;
    clearTimeout(hideTimer);
    currentTarget = target;
    const el = ensureEl();
    el.textContent = tip;
    el.style.display = 'block';
    el.style.opacity = '0';
    // Wait one frame so size is measurable
    requestAnimationFrame(() => {
      if (currentTarget !== target) return;
      const r = target.getBoundingClientRect();
      const tr = el.getBoundingClientRect();
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const pad = 10;
      // Vertical: prefer above, flip below if not enough room
      let top = r.top - tr.height - 10;
      if (top < pad) top = r.bottom + 10;
      // If still off-screen (very tall tooltip), pin to top
      if (top + tr.height > vh - pad) top = Math.max(pad, vh - tr.height - pad);
      // Horizontal: center on target, then clamp to viewport
      let left = r.left + r.width / 2 - tr.width / 2;
      if (left < pad) left = pad;
      if (left + tr.width > vw - pad) left = vw - tr.width - pad;
      el.style.top = top + 'px';
      el.style.left = left + 'px';
      el.classList.add('show');
    });
  }

  function hide() {
    currentTarget = null;
    if (!tipEl) return;
    tipEl.classList.remove('show');
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      if (tipEl) tipEl.style.display = 'none';
    }, 150);
  }

  // Event delegation — works for any element with [data-tip], present or future
  document.addEventListener('mouseover', e => {
    const target = e.target.closest && e.target.closest('[data-tip]');
    if (target && target !== currentTarget) show(target);
  }, true);
  document.addEventListener('mouseout', e => {
    if (!currentTarget) return;
    // Only hide if leaving the current target (not entering a child)
    const target = e.target.closest && e.target.closest('[data-tip]');
    if (target === currentTarget && !currentTarget.contains(e.relatedTarget)) hide();
  }, true);
  document.addEventListener('scroll', hide, true);
  window.addEventListener('blur', hide);
})();

// Render BOTH MoM and WoW delta pills side-by-side

  function pill(d, label) {
    if (d === null || d === undefined || isNaN(d)) return `<span class="delta-pill neutral"><span class="dp-label">${label}</span>—</span>`;

    let cls;

    else                          cls = isUp ? 'bad'  : 'good';
    if (Math.abs(d) < 0.001) cls = 'neutral';
    return `<span class="delta-pill ${cls}"><span class="dp-label">${label}</span>${sign} ${(Math.abs(d)*100).toFixed(1)}%</span>`;
  }

  return `<div class="mini-chart">
    <div class="mini-chart-title">${escapeHtml(title)}</div>
    <div class="mini-bar-list">
      ${items.map(i => {

  document.body.appendChild(overlay);
  // Wire actions
  overlay.querySelector('#landingUpload').addEventListener('click', () => {
    // Trigger the existing upload flow
    const f = document.getElementById('fileInput');
    if (f) f.click();
    // Listen for change once, then dismiss
    const onChange = () => {
      f.removeEventListener('change', onChange);
      // Upload handler in js_boot will replace data and re-render
      dismissLanding();
    };
    if (f) f.addEventListener('change', onChange);
  });
  overlay.querySelector('#landingContinue').addEventListener('click', () => {
    dismissLanding();
    if (onContinue) onContinue();
  });
}
function dismissLanding() {
  const o = document.getElementById('landingOverlay');
  if (!o) return;
  o.classList.add('closing');
  setTimeout(() => o.remove(), 260);
}

// EXPORT STANDALONE HTML — embed current data, generate downloadable file
// ============================================================
async function exportStandaloneHTML() {
  if (!lastRaw) {
    alert('No data loaded yet. Upload a file first.');
    return;
  }
  const btn = document.getElementById('exportBtn');
  const original = btn ? btn.innerHTML : '';
  if (btn) { btn.innerHTML = '<span>⏳</span><span>Building…</span>'; btn.disabled = true; }

  try {
    // 1. Serialize + gzip + base64 (mirrors the build pipeline)
    const json = JSON.stringify(lastRaw);
    const cs = new CompressionStream('gzip');
    const stream = new Blob([json]).stream().pipeThrough(cs);
    const blob = await new Response(stream).blob();
    const bytes = new Uint8Array(await blob.arrayBuffer());
    // Build base64 in chunks (avoids "Maximum call stack" for large arrays)
    let bin = '';
    const CHUNK = 8192;
    for (let i = 0; i < bytes.length; i += CHUNK) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
    }
    const newB64 = btoa(bin);

    // 2. Fetch the current HTML page source
    let currentHtml;
    try {
      const resp = await fetch(window.location.href, { cache: 'no-store' });
      currentHtml = await resp.text();
    } catch (e) {
      // file:// fallback or fetch failure → use in-memory DOM
      currentHtml = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
    }

    // 3. Swap the embedded DATA_B64 string
    const re = /const DATA_B64 = "[^"]*";/;
    if (!re.test(currentHtml)) {
      throw new Error("Couldn't find DATA_B64 marker in HTML — can't rebuild.");
    }
    const newHtml = currentHtml.replace(re, `const DATA_B64 = "${newB64}";`);

    // 4. Trigger download with date-stamped filename
    const now = new Date();
    const stamp = now.toISOString().slice(0, 10);
    const dlBlob = new Blob([newHtml], { type: 'text/html' });
    const url = URL.createObjectURL(dlBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `ace_blend_ads_intel_${stamp}.html`;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);

    if (btn) {
      btn.innerHTML = '<span>✅</span><span>Downloaded</span>';
      setTimeout(() => { btn.innerHTML = original; btn.disabled = false; }, 2200);
    }
  } catch (e) {
    console.error(e);
    if (btn) {
      btn.innerHTML = '<span>⚠️</span><span>Failed</span>';
      setTimeout(() => { btn.innerHTML = original; btn.disabled = false; }, 2500);
    }
    alert('Export failed: ' + e.message);
  }
}

function sumField(rows, field) {
  return rows.reduce((s, r) => s + (Number(r[field]) || 0), 0);
}
// Wrapper: get window-level CE aggregate
function ceAgg(win) {
  const rows = DS.ce[win] || [];
  const spend = sumField(rows, 'sp');
  const sales = sumField(rows, 'sl');
  const impr  = sumField(rows, 'im');
  const clicks = sumField(rows, 'ck');
  const orders = sumField(rows, 'or');
  return { spend, sales, impr, clicks, orders, ctr: impr ? clicks/impr : 0, acos: sales ? spend/sales : 0 };
}
// Window-level BR aggregate
function brAgg(win) {
  const rows = DS.br[win] || [];
  const sales  = sumField(rows, 'sl');
  const units  = sumField(rows, 'un');
  const ses    = sumField(rows, 'ses');
  const pv     = sumField(rows, 'pv');
  const orders = sumField(rows, 'or');
  const aov = orders ? sales / orders : 0;
  const cr  = ses ? orders / ses : 0;
  return { sales, units, sessions: ses, pageViews: pv, orders, aov, cr };
}

// Category-level combined table
function categoryAgg(win) {
  // Join BR rows -> ASIN_MAPPER -> Category aggregation
  const brRows = DS.br[win] || [];
  const out = new Map();
  for (const r of brRows) {
    const asin = r.asin || r.pasin;
    const meta = DS.asinByAsin.get(asin);
    const cat = meta && meta.cat ? meta.cat : 'Uncategorized';
    if (!out.has(cat)) out.set(cat, { cat, sales: 0, units: 0, sessions: 0, pv: 0, orders: 0 });
    const o = out.get(cat);
    o.sales    += Number(r.sl)  || 0;
    o.units    += Number(r.un)  || 0;
    o.sessions += Number(r.ses) || 0;
    o.pv       += Number(r.pv)  || 0;
    o.orders   += Number(r.or)  || 0;
  }
  return out;
}

function ceCategoryAgg(win) {
  const ceRows = DS.ce[win] || [];
  const out = new Map();
  for (const r of ceRows) {
    const m = DS.campByName.get(r.cn) || {};
    const cat = m.cat || r.pf || 'Uncategorized';
    if (!out.has(cat)) out.set(cat, { cat, spend: 0, sales: 0, impr: 0, clicks: 0, orders: 0 });
    const o = out.get(cat);
    o.spend  += Number(r.sp) || 0;
    o.sales  += Number(r.sl) || 0;
    o.impr   += Number(r.im) || 0;
    o.clicks += Number(r.ck) || 0;
    o.orders += Number(r.or) || 0;
  }
  return out;
}

const ModalStack = [];

function openModal({ title, subtitle, body, onClose, afterMount }) {
  const id = 'modal-' + Math.random().toString(36).slice(2, 9);
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.dataset.id = id;
  overlay.innerHTML = `<div class="modal-card" role="dialog" aria-modal="true">
    <button class="modal-close" aria-label="Close">×</button>
    <div class="modal-head">
      <h2 class="modal-title">${escapeHtml(title)}</h2>
      ${subtitle ? `<div class="modal-subtitle">${subtitle}</div>` : ''}
    </div>
    <div class="modal-body">${body}</div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => {
    if (e.target === overlay || e.target.classList.contains('modal-close')) closeModal(id);
  });
  ModalStack.push({ id, overlay, onClose });
  requestAnimationFrame(() => overlay.classList.add('open'));
  if (afterMount) requestAnimationFrame(() => afterMount(overlay));
  return id;
}

function closeModal(id) {
  const m = ModalStack.find(x => x.id === id);
  if (!m) return;
  m.overlay.classList.remove('open');
  setTimeout(() => {
    m.overlay.remove();
    if (m.onClose) m.onClose();
    const idx = ModalStack.findIndex(x => x.id === id);
    if (idx >= 0) ModalStack.splice(idx, 1);
  }, 220);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && ModalStack.length) {
    closeModal(ModalStack[ModalStack.length - 1].id);
  }
});

  sbSpend: {

    fmt: fmtINR, semantic: 'good_down',
    compute: win => {

  sbSales: {
    title: 'SB Sales Breakdown',

    fmt: fmtINR, semantic: 'good_up',
    compute: win => {

      const r = new Map();
      for (const row of (DS.ce[win] || [])) {

// ASIN DRILLDOWN MODAL
// Triggered by clicking a category in Overview table OR breakdown modal
// ============================================================

function brSliceForCat(category, win) {
  let sales = 0, units = 0, sessions = 0, pv = 0, orders = 0;
  const rows = DS.br[win] || [];
  for (const r of rows) {
    const asin = r.asin || r.pasin;
    const meta = DS.asinByAsin.get(asin);
    if (!meta || meta.cat !== category) continue;
    sales    += Number(r.sl)  || 0;
    units    += Number(r.un)  || 0;
    sessions += Number(r.ses) || 0;
    pv       += Number(r.pv)  || 0;
    orders   += Number(r.or)  || 0;
  }
  return { sales, units, sessions, pv, orders, cr: sessions ? orders / sessions : 0, aov: orders ? sales / orders : 0 };
}

function ceSliceForCat(category, win) {
  let spend = 0, sales = 0, impr = 0, clicks = 0;
  for (const r of (DS.ce[win] || [])) {
    const m = DS.campByName.get(r.cn);
    const cat = (m && m.cat) ? m.cat : r.pf;
    if (cat !== category) continue;
    spend  += Number(r.sp) || 0;
    sales  += Number(r.sl) || 0;
    impr   += Number(r.im) || 0;
    clicks += Number(r.ck) || 0;
  }
  return { spend, sales, impr, clicks, ctr: impr ? clicks / impr : 0, acos: sales ? spend / sales : 0 };
}

function asinBreakdownForCat(category, win) {
  // Returns Map<asin, {sl, un, ses, or}> for BR data, filtered to category
  const out = new Map();
  for (const r of (DS.br[win] || [])) {
    const asin = r.asin || r.pasin;
    const meta = DS.asinByAsin.get(asin);
    if (!meta || meta.cat !== category) continue;
    if (!out.has(asin)) out.set(asin, { sl: 0, un: 0, ses: 0, or: 0, pv: 0 });
    const o = out.get(asin);
    o.sl  += Number(r.sl)  || 0;
    o.un  += Number(r.un)  || 0;
    o.ses += Number(r.ses) || 0;
    o.or  += Number(r.or)  || 0;
    o.pv  += Number(r.pv)  || 0;
  }
  return out;
}

function adSpendByAsinForCat(category, win) {
  const out = new Map();
  function add(rows) {
    for (const r of rows || []) {
      const asin = r.asin;
      if (!asin) continue;
      const meta = DS.asinByAsin.get(asin);
      if (!meta || meta.cat !== category) continue;
      out.set(asin, (out.get(asin) || 0) + (Number(r.sp) || 0));
    }
  }
  add(DS.spAsin[win]);
  add(DS.sdAsin[win]);
  return out;
}

function renderMiniKpi(title, dataByWin, field, fmt, semantic, tip) {
  const vw = getViewWindows();
  const primary = dataByWin[vw.primary][field];
  const comparison = dataByWin[vw.comparison][field];
  const delta = deltaPct(primary, comparison);
  // The remaining 3 windows (besides primary)
  const others = ['mtd','pmtd','l7d','p7d'].filter(w => w !== vw.primary);
  const otherHtml = others.map(w => {
    const isCompare = (w === vw.comparison);
    return `<div class="mini-kpi-pair">
      <div class="mkp-label" style="color:${isCompare ? 'var(--ink-soft)' : 'var(--ink-mute)'};${isCompare ? '' : 'opacity:0.7'}">${w.toUpperCase()}</div>
      <div class="mkp-val ${isCompare ? '' : 'mute'}">${fmt(dataByWin[w][field])}</div>
    </div>`;
  }).join('');
  return `<div class="mini-kpi">
    <div class="mini-kpi-title">${escapeHtml(title)}${tip ? infoI(tip) : ''}</div>
    <div class="mini-kpi-grid-2">
      <div class="mini-kpi-pair">
        <div class="mkp-label" style="color:var(--blue)">${vw.primaryLabel}</div>
        <div class="mkp-val">${fmt(primary)}</div>
        <div style="margin-top:4px">${fmtDeltaPill(delta, semantic)}</div>
      </div>
      ${otherHtml}
    </div>
  </div>`;
}

function asinUrl(asin) {
  const meta = DS.asinByAsin.get(asin);
  if (meta && meta.url) {
    return meta.url.startsWith('http') ? meta.url : 'https://' + meta.url;
  }
  return `https://www.amazon.in/dp/${asin}`;
}

function openAsinDrilldown(category) {
  const vw = getViewWindows();
  // Window-level slices for the mini KPIs
  const br = {
    mtd:  brSliceForCat(category, 'mtd'),
    pmtd: brSliceForCat(category, 'pmtd'),
    l7d:  brSliceForCat(category, 'l7d'),
    p7d:  brSliceForCat(category, 'p7d'),
  };
  const ce = {
    mtd:  ceSliceForCat(category, 'mtd'),
    pmtd: ceSliceForCat(category, 'pmtd'),
    l7d:  ceSliceForCat(category, 'l7d'),
    p7d:  ceSliceForCat(category, 'p7d'),
  };
  // Per-ASIN by window
  const aM  = asinBreakdownForCat(category, 'mtd');
  const aP  = asinBreakdownForCat(category, 'pmtd');
  // Ad attribution (SP+SD ASIN reports) per ASIN
  const adsM = adAttribByAsinForCat(category, vw.primary);
  const adsP = adAttribByAsinForCat(category, vw.comparison);

  // Build row data and totals
  const rowsData = [...new Set([...aM.keys(), ...aP.keys(), ...adsM.keys()])].map(asin => {
    const m = aM.get(asin) || {};
    const p = aP.get(asin) || {};
    const adM = adsM.get(asin) || { spend:0, sales:0, orders:0, units:0, impr:0, clicks:0 };
    const adP = adsP.get(asin) || { spend:0, sales:0, orders:0, units:0, impr:0, clicks:0 };
    const meta = DS.asinByAsin.get(asin) || {};
    const totalSales = m.sl || 0;
    const adSales = adM.sales || 0;
    const adContrib = totalSales ? adSales / totalSales : 0;
    const cr = m.ses ? (m.or || 0) / m.ses : 0;
    const aov = m.or ? m.sl / m.or : 0;
    const acos = adSales ? adM.spend / adSales : null;
    return {
      asin,
      title: meta.tt || asin,
      url: asinUrl(asin),
      totalSales,
      totalSalesP: p.sl || 0,
      delta: deltaPct(totalSales, p.sl || 0),
      adSales,
      adSalesP: adP.sales || 0,
      adDelta: deltaPct(adSales, adP.sales || 0),
      adContrib,
      units: m.un || 0,
      sessions: m.ses || 0,
      cr, aov,
      adSpend: adM.spend || 0,
      acos,
    };
  }).filter(r => r.totalSales > 0 || r.adSales > 0 || r.adSpend > 0)
    .sort((a, b) => b.totalSales - a.totalSales);

  // Category totals for sales-contribution baseline (within this category)
  const catTotalSales = rowsData.reduce((s, r) => s + r.totalSales, 0);
  const catAdSales    = rowsData.reduce((s, r) => s + r.adSales, 0);
  const catAdSpend    = rowsData.reduce((s, r) => s + r.adSpend, 0);
  const catUnits      = rowsData.reduce((s, r) => s + r.units, 0);
  const catSessions   = rowsData.reduce((s, r) => s + r.sessions, 0);

  // 4 mini KPIs (now respect ViewMode)
  const kpisHtml = `<div class="mini-kpi-grid">
    ${renderMiniKpi('Total Sales', br, 'sales', fmtINR, 'good_up', METRIC_TIPS.totalSales)}
    ${renderMiniKpi('Units',       br, 'units', fmtNum, 'good_up', METRIC_TIPS.units)}
    ${renderMiniKpi('Avg CR%',     br, 'cr',    v => fmtPct(v, 2), 'good_up', METRIC_TIPS.cr)}
    ${renderMiniKpi('Ad Spend',    ce, 'spend', fmtINR, 'good_down', METRIC_TIPS.adSpend)}
  </div>`;

  // ASIN table — now with Total Sales, Ad Sales (NEW), Ad Contrib % (NEW), Units, CR%, AOV, Ad Spend, ACOS
  const headerHtml = `<thead>
    <tr>
      <th class="sortable" data-col="0" data-tip="Advertised ASIN. Click pill to open PDP.&#10;Click header to sort A↔Z.">ASIN</th>
      <th class="sortable" data-col="1" data-tip="Product title from ASIN_MAPPER">TITLE</th>
      <th class="num sortable" data-col="2" data-tip="${METRIC_TIPS.totalSales}&#10;Window: ${vw.primaryLabel}">TOTAL SALES ${vw.primaryLabel}</th>
      <th class="num sortable" data-col="3" data-tip="Total Sales · ${vw.comparisonLabel} (comparison window)">TOTAL ${vw.comparisonLabel}</th>
      <th class="num sortable" data-col="4" data-tip="${vw.dLabel}&#10;Field: Total Sales">${vw.dLabel}</th>
      <th class="num sortable" data-col="5" data-tip="AD SALES (per ASIN)&#10;Source: SP_ASIN + SD_ASIN reports&#10;Sales attributed to ads within the 14-day window.">AD SALES ${vw.primaryLabel}</th>
      <th class="num sortable" data-col="6" data-tip="${METRIC_TIPS.adContrib}">AD CONTRIB %</th>
      <th class="num sortable" data-col="7" data-tip="${METRIC_TIPS.units}">UNITS</th>
      <th class="num sortable" data-col="8" data-tip="${METRIC_TIPS.sessions}">SESSIONS</th>
      <th class="num sortable" data-col="9" data-tip="${METRIC_TIPS.cr}">CR%</th>
      <th class="num sortable" data-col="10" data-tip="${METRIC_TIPS.aov}">AOV</th>
      <th class="num sortable" data-col="11" data-tip="${METRIC_TIPS.adSpend}&#10;Source: SP+SD ASIN reports">AD SPEND</th>
      <th class="num sortable" data-col="12" data-tip="${METRIC_TIPS.acos}">ACOS</th>
    </tr></thead>`;

  const bodyHtml = `<tbody>
    ${rowsData.map(r => `<tr>
      <td data-val="${escapeHtml(r.asin)}"><a class="asin-pill" href="${r.url}" target="_blank" rel="noopener noreferrer" data-tip="Open Amazon PDP in new tab">${escapeHtml(r.asin)}<span class="asin-arrow">↗</span></a></td>
      <td data-val="${escapeHtml(r.title)}"><div class="asin-title" title="${escapeHtml(r.title)}">${escapeHtml(r.title)}</div></td>

// ----- BR Analysis state + helpers -----
const BrState = { catFilter: 'ALL', search: '' };

function brAsinRows(catFilter='ALL') {
  // Build per-ASIN row data joining BR with ASIN_MAPPER, for all 4 windows
  const rowsByAsin = new Map();
  function ingest(rows, win) {
    for (const r of rows) {
      const asin = r.asin || r.pasin;
      if (!asin) continue;
      const meta = DS.asinByAsin.get(asin);
      const cat = (meta && meta.cat) || 'Uncategorized';
      if (catFilter !== 'ALL' && cat !== catFilter) continue;
      if (!rowsByAsin.has(asin)) {
        rowsByAsin.set(asin, {
          asin, cat,
          title: (meta && meta.tt) || asin,
          url: asinUrl(asin),
          status: (meta && meta.st) || null,
          sp: (meta && meta.sprice) || null,
          mrp: (meta && meta.mrp) || null,
          mtd: { sl:0, un:0, ses:0, pv:0, or:0 },
          pmtd: { sl:0, un:0, ses:0, pv:0, or:0 },
          l7d:  { sl:0, un:0, ses:0, pv:0, or:0 },
          p7d:  { sl:0, un:0, ses:0, pv:0, or:0 },
        });
      }
      const o = rowsByAsin.get(asin)[win];
      o.sl  += Number(r.sl)  || 0;
      o.un  += Number(r.un)  || 0;
      o.ses += Number(r.ses) || 0;
      o.pv  += Number(r.pv)  || 0;
      o.or  += Number(r.or)  || 0;
    }
  }
  ingest(DS.br.mtd  || [], 'mtd');
  ingest(DS.br.pmtd || [], 'pmtd');
  ingest(DS.br.l7d  || [], 'l7d');
  ingest(DS.br.p7d  || [], 'p7d');
  return [...rowsByAsin.values()];
}

function brLiveSummary(rows) {
  const totalSales = rows.reduce((s, r) => s + r.mtd.sl, 0);
  const totalUnits = rows.reduce((s, r) => s + r.mtd.un, 0);
  const totalSessions = rows.reduce((s, r) => s + r.mtd.ses, 0);
  const totalOrders = rows.reduce((s, r) => s + r.mtd.or, 0);
  const avgCR = totalSessions ? totalOrders / totalSessions : 0;
  return { count: rows.length, totalSales, totalUnits, totalSessions, avgCR };
}

function renderBrCategoryRollup() {
  const brMTD = categoryAgg('mtd'), brPMTD = categoryAgg('pmtd'), brL7D = categoryAgg('l7d'), brP7D = categoryAgg('p7d');
  const cats = [...brMTD.keys()].sort((a, b) => (brMTD.get(b).sales || 0) - (brMTD.get(a).sales || 0));
  const grandSales = [...brMTD.values()].reduce((s, r) => s + (r.sales || 0), 0);
  const grandUnits = [...brMTD.values()].reduce((s, r) => s + (r.units || 0), 0);
  const grandSessions = [...brMTD.values()].reduce((s, r) => s + (r.sessions || 0), 0);
  const grandOrders = [...brMTD.values()].reduce((s, r) => s + (r.orders || 0), 0);

  const rowsHtml = cats.map(cat => {
    const m = brMTD.get(cat) || {};
    const p = brPMTD.get(cat) || {};
    const l = brL7D.get(cat) || {};
    const pp = brP7D.get(cat) || {};
    const mom = deltaPct(m.sales, p.sales);
    const wow = deltaPct(l.sales, pp.sales);
    const cr  = m.sessions ? (m.orders || 0) / m.sessions : 0;
    const aov = m.orders ? m.sales / m.orders : 0;
    const share = grandSales ? (m.sales || 0) / grandSales : 0;
    return `<tr class="clickable" data-cat="${escapeHtml(cat)}">
      <td data-val="${escapeHtml(cat)}"><span class="cat-row">${catDot(cat)}<span>${escapeHtml(cat)}</span><span class="arrow">↗</span></span></td>

      ${numCell(p.sales,  fmtINR(p.sales), '', 'color:var(--ink-mute)')}

      ${numCell(pp.sales, fmtINR(pp.sales), '', 'color:var(--ink-mute)')}
      ${numCell(wow,      fmtDeltaCell(wow, 'good_up'))}

      ${numCell(cr,       fmtCrCell(cr))}
      ${numCell(aov,      fmtINR(aov))}

  return `<div class="section">
    <div class="section-header">
      <div class="section-title title-em-rule">BR Category Rollup${infoI("Categories ranked by MTD Total Sales. Click a row to filter the ASIN table below.")}</div>

    </div>

        <thead><tr>
          <th rowspan="2" class="sortable" data-col="0" data-tip="Product category (from ASIN_MAPPER).&#10;Click to sort A↔Z.&#10;Click row to filter ASIN table below.">Category</th>
          <th colspan="6" class="header-group">— TOTAL SALES (BR) —</th>
          <th rowspan="2" class="num sortable" data-col="7" data-tip="${METRIC_TIPS.contribDual}&#10;Showing share of overall MTD BR sales.">Share %</th>
          <th colspan="2" class="header-group">— UNITS / SESSIONS —</th>
          <th rowspan="2" class="num sortable" data-col="10" data-tip="${METRIC_TIPS.cr}">CR%</th>

        </tr></thead>
        <tbody>${rowsHtml}</tbody>

function campaignsKpiCards() {
  const ce = { mtd: ceAgg('mtd'), pmtd: ceAgg('pmtd'), l7d: ceAgg('l7d'), p7d: ceAgg('p7d') };

    { title:'Total Spend',  tint:'tint-orange', metric:'adSpend',     val: w => ce[w].spend, fmt: fmtINR, semantic:'good_down', tip: METRIC_TIPS.adSpend },
    { title:'Ad Sales',     tint:'tint-purple', metric:'adSales',     val: w => ce[w].sales, fmt: fmtINR, semantic:'good_up',   tip: METRIC_TIPS.adSales },
    { title:'ACOS',         tint:'tint-pink',   metric:'acos',        val: w => ce[w].acos,  fmt: v => fmtPct(v,2), semantic:'good_down', tip: METRIC_TIPS.acos },
    { title:'CPC',          tint:'tint-cyan',   metric:'cpc',         val: w => ce[w].clicks ? ce[w].spend/ce[w].clicks : 0, fmt: fmtINR, semantic:'good_down', tip: "CPC (Cost Per Click)\nFormula: Spend ÷ Clicks" },
    { title:'Impressions',  tint:'tint-blue',   metric:'impressions', val: w => ce[w].impr, fmt: fmtNum, semantic:'good_up',   tip: "Impressions\nSource: CE\nTotal ad serves." },

// Two-tier bleeder classification per CE row
function classifyCampaign(r) {
  const SPEND_FLOOR = 20000;
  const spend = Number(r.sp) || 0;
  const sales = Number(r.sl) || 0;
  const acos = sales ? spend/sales : null;
  if (spend > 0 && sales === 0) return 'zero';
  if (spend >= SPEND_FLOOR && acos !== null) {
    if (acos >= 1.0) return 'bleeder';
    if (acos >= 0.8) return 'watch';
  }
  if (spend >= SPEND_FLOOR && acos !== null && acos < 0.45) return 'winner';
  return 'normal';
}
function bleedDotHtml(state) {
  if (state === 'bleeder') return `<span class="bleeder-dot" data-tip="Bleeder: ACOS ≥ 100% AND Spend ≥ ₹20K"></span>`;
  if (state === 'watch') return `<span class="watch-dot" data-tip="Watch List: ACOS 80-100% AND Spend ≥ ₹20K"></span>`;
  if (state === 'zero') return `<span class="bleeder-dot" style="background:#94A3B8;box-shadow:0 0 0 2px rgba(148,163,184,0.18)" data-tip="Zero-Sales: spending with no sales attribution"></span>`;
  if (state === 'winner') return `<span class="bleeder-dot" style="background:var(--green);box-shadow:0 0 0 2px rgba(22,163,74,0.18)" data-tip="Winner: ACOS < 45% AND Spend ≥ ₹20K"></span>`;
  return `<span style="display:inline-block;width:8px;height:8px;border-radius:999px;background:transparent"></span>`;
}

const BleedState = { view: 'bleeder' }; // bleeder | watch | zero | winner | all

function computeBleedStats(win='mtd') {
  const rows = DS.ce[win] || [];
  let total = { spend:0, sales:0, count:0 };
  let bleeder = { spend:0, sales:0, count:0 };
  let watch = { spend:0, sales:0, count:0 };
  let zero = { spend:0, count:0 };
  let winner = { spend:0, sales:0, count:0 };
  let active = 0;
  for (const r of rows) {
    const sp = Number(r.sp) || 0;
    const sl = Number(r.sl) || 0;
    total.spend += sp; total.sales += sl; total.count++;
    if (sp > 0) active++;
    const st = classifyCampaign(r);
    if (st === 'bleeder') { bleeder.spend += sp; bleeder.sales += sl; bleeder.count++; }
    else if (st === 'watch') { watch.spend += sp; watch.sales += sl; watch.count++; }
    else if (st === 'zero') { zero.spend += sp; zero.count++; }
    else if (st === 'winner') { winner.spend += sp; winner.sales += sl; winner.count++; }
  }
  return { total, bleeder, watch, zero, winner, active };
}

function computeKeywordConflicts(win='mtd') {
  const strRows = DS.spStr[win] || [];
  const byTerm = new Map();
  for (const r of strRows) {
    const term = r.q;
    if (!term) continue;
    const camp = r.cn;
    if (!camp) continue;
    if (!byTerm.has(term)) byTerm.set(term, new Map());
    const cm = byTerm.get(term);
    if (!cm.has(camp)) cm.set(camp, { sp:0, sl:0 });
    const o = cm.get(camp);
    o.sp += Number(r.sp) || 0;
    o.sl += Number(r.sl) || 0;
  }
  let conflicts = 0, wastedDup = 0;
  for (const [t, camps] of byTerm) {
    if (camps.size < 2) continue;
    conflicts++;
    const sorted = [...camps.values()].sort((a, b) => {
      const aR = a.sp ? a.sl/a.sp : 0;
      const bR = b.sp ? b.sl/b.sp : 0;
      return bR - aR;
    });
    for (let i = 1; i < sorted.length; i++) wastedDup += sorted[i].sp;
  }
  return { conflicts, wastedDup };
}

function categoryBleedBars(metric='spend') {
  const cats = ceCategoryAgg('mtd');
  const arr = [...cats.entries()]
    .map(([cat, r]) => ({ label: cat, color: catColor(cat),
        val: metric === 'acos' ? (r.sales ? r.spend/r.sales : 0) : r.spend }))
    .filter(r => r.val > 0)
    .sort((a, b) => b.val - a.val).slice(0, 8);
  return arr;
}
function bcgBleedBars(metric='spend') {
  const out = new Map();
  for (const r of DS.ce.mtd || []) {
    const m = DS.campByName.get(r.cn) || {};
    const bcg = m.bcg || 'Unmapped';
    if (!out.has(bcg)) out.set(bcg, { spend:0, sales:0 });
    const o = out.get(bcg);
    o.spend += Number(r.sp) || 0;
    o.sales += Number(r.sl) || 0;
  }
  const colors = { 'Gen':'#1D4ED8','Branded':'#15803D','Comp':'#BE123C','Mix':'#B45309','Unmapped':'#94A3B8' };
  return [...out.entries()].map(([bcg, r]) => ({
    label: bcg, color: colors[bcg] || '#475569',
    val: metric === 'acos' ? (r.sales ? r.spend/r.sales : 0) : r.spend,
  })).filter(r => r.val > 0).sort((a,b) => b.val - a.val);
}
function renderMiniBars(title, items, fmt, colorByAcos=false) {
  const max = Math.max(...items.map(i => i.val), 1);
  return `<div class="mini-chart">
    <div class="mini-chart-title">${escapeHtml(title)}</div>
    <div class="mini-bar-list">
      ${items.map(i => {
        let fill = i.color;
        if (colorByAcos) {
          const band = acosBand(i.val);
          fill = band === 'good' ? '#15803D' : band === 'ok' ? '#B45309' : band === 'warn' ? '#C2410C' : '#BE123C';
        }
        return `<div class="mini-bar">
          <div class="label">${escapeHtml(i.label)}</div>
          <div class="track"><div class="fill" style="width:${(i.val/max*100).toFixed(1)}%;background:${fill}"></div></div>
          <div class="val">${fmt(i.val)}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

const StrState = {
  source: 'sp',         // 'sp' or 'sb'
  metric: 'sp',         // sp/sl/ac/im/ck/or/ctr/cpc
  stateFilter: 'ALL',   // 'ALL' | 'bleeder' | 'watch' | 'winner' | 'zero'
  catFilter: 'ALL',
  bcgFilter: 'ALL',
  matchFilter: 'ALL',
  minSpend: 500,
  search: ''
};

function strRows(win, source) {
  return (source === 'sb' ? DS.sbStr[win] : DS.spStr[win]) || [];
}

function classifyTerm(r) {
  const SPEND_FLOOR = 500;
  const sp = Number(r.sp) || 0;
  const sl = Number(r.sl) || 0;
  const ac = sl ? sp/sl : null;
  if (sp > 0 && sl === 0) return 'zero';
  if (sp >= SPEND_FLOOR && ac !== null) {
    if (ac >= 1.0) return 'bleeder';
    if (ac >= 0.8) return 'watch';
    if (ac < 0.45) return 'winner';
  }
  return 'normal';
}

function strSummary(rows) {
  let sp=0, sl=0, im=0, ck=0, or_=0;
  for (const r of rows) {
    sp += Number(r.sp) || 0;
    sl += Number(r.sl) || 0;
    im += Number(r.im) || 0;
    ck += Number(r.ck) || 0;
    or_ += Number(r.or) || 0;
  }
  return { sp, sl, im, ck, or: or_, ctr: im ? ck/im : 0, acos: sl ? sp/sl : 0, cpc: ck ? sp/ck : 0 };
}

function strBleederStrip() {
  const rows = strRows('mtd', StrState.source);
  let bleed = {n:0,sp:0,sl:0}, watch = {n:0,sp:0,sl:0}, win = {n:0,sp:0,sl:0}, zero = {n:0,sp:0};
  for (const r of rows) {
    const s = classifyTerm(r);
    const sp = Number(r.sp) || 0, sl = Number(r.sl) || 0;
    if (s === 'bleeder') { bleed.n++; bleed.sp += sp; bleed.sl += sl; }
    else if (s === 'watch') { watch.n++; watch.sp += sp; watch.sl += sl; }
    else if (s === 'winner') { win.n++; win.sp += sp; win.sl += sl; }
    else if (s === 'zero') { zero.n++; zero.sp += sp; }
  }
  return `<div class="bleed-strip" style="grid-template-columns:repeat(4,1fr)">
    <div class="bleed-card" data-state="bleeder">
      <div class="bc-title">Bleeder Terms${infoI("Search terms with ACOS ≥ 100% AND Spend ≥ ₹500")}</div>
      <div class="bc-hero" style="color:var(--pink)">${bleed.n}</div>

      <div class="bc-hint">Click to filter table →</div>
    </div>

      <div class="bc-title">Watch List${infoI("ACOS 80-100% AND Spend ≥ ₹500")}</div>

      <div class="bc-title">Winners${infoI("ACOS &lt; 45% AND Spend ≥ ₹500")}</div>
      <div class="bc-hero" style="color:#86EFAC">${win.n}</div>

function renderStrComparisonChart() {
  const ctx = document.getElementById('strComparisonChart');
  if (!ctx) return;
  // Aggregate STR rows by Category × window
  function aggByCat(win) {
    const out = new Map();
    for (const r of strRows(win, StrState.source)) {
      const cm = DS.campByName.get(r.cn) || {};
      const cat = cm.cat || r.pf || 'Uncategorized';
      if (!out.has(cat)) out.set(cat, { sp:0, sl:0, im:0, ck:0, or:0 });
      const o = out.get(cat);
      o.sp += Number(r.sp) || 0;
      o.sl += Number(r.sl) || 0;
      o.im += Number(r.im) || 0;
      o.ck += Number(r.ck) || 0;
      o.or += Number(r.or) || 0;
    }
    return out;
  }
  const m = aggByCat('mtd'), p = aggByCat('pmtd');
  // Compute the chosen metric per category
  function val(c, metric) {
    switch (metric) {
      case 'sp': return c.sp;
      case 'sl': return c.sl;
      case 'ac': return c.sl ? c.sp/c.sl : 0;
      case 'im': return c.im;
      case 'ck': return c.ck;
      case 'or': return c.or;
      case 'ctr': return c.im ? c.ck/c.im : 0;
      case 'cpc': return c.ck ? c.sp/c.ck : 0;
    }
  }
  const labelMap = { sp:'Spend', sl:'Sales', ac:'ACOS', im:'Impressions', ck:'Clicks', or:'Orders', ctr:'CTR', cpc:'CPC' };
  const isPct = ['ac','ctr'].includes(StrState.metric);
  const isMoney = ['sp','sl','cpc'].includes(StrState.metric);
  const cats = [...new Set([...m.keys(), ...p.keys()])]
    .map(c => ({ cat: c, mtd: val(m.get(c)||{}, StrState.metric), pmtd: val(p.get(c)||{}, StrState.metric) }))
    .filter(r => r.mtd > 0 || r.pmtd > 0)
    .sort((a,b) => b.mtd - a.mtd).slice(0, 10);
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: cats.map(c => c.cat),
      datasets: [
        { label: 'MTD', data: cats.map(c => c.mtd), backgroundColor: '#223CCF', borderRadius:6 },
        { label: 'PMTD', data: cats.map(c => c.pmtd), backgroundColor: '#CBD5E1', borderRadius:6 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', align:'end', labels: { font:{family:'Inter'} } },
        tooltip: { callbacks: { label: ctx => `${ctx.dataset.label} ${labelMap[StrState.metric]}: ${isPct ? fmtPct(ctx.parsed.y,2) : isMoney ? fmtINR(ctx.parsed.y) : fmtNum(ctx.parsed.y)}` } },
        title: { display: true, text: labelMap[StrState.metric] + ' by Category', font:{family:'Inter', size:13, weight:'700'}, color:'#3B4068' }
      },
      scales: {
        x: { grid: {display:false}, ticks:{ font:{family:'Inter', size:11} } },
        y: { ticks: { font:{family:'Inter'}, callback: v => isPct ? fmtPct(v,1) : isMoney ? fmtINR(v) : fmtNum(v) }, grid:{ color:'#F1F3F5' } },
      },
    },
  });
}

function refreshStrTable() {

    const cm = DS.campByName.get(r.cn) || {};
    const cat = cm.cat || r.pf || 'Uncategorized';
    const bcg = cm.bcg || null;
    const mt = r.mt;
    const sp = Number(r.sp) || 0;
    if (StrState.catFilter !== 'ALL' && cat !== StrState.catFilter) return false;
    if (StrState.bcgFilter !== 'ALL' && bcg !== StrState.bcgFilter) return false;
    if (StrState.matchFilter !== 'ALL' && mt !== StrState.matchFilter) return false;
    if (sp < StrState.minSpend) return false;
    if (StrState.stateFilter !== 'ALL' && classifyTerm(r) !== StrState.stateFilter) return false;
    if (StrState.search) {
      const s = StrState.search.toLowerCase();
      if (!String(r.q || '').toLowerCase().includes(s) && !String(r.cn || '').toLowerCase().includes(s)) return false;

    return true;

const PlState = { placementFilter: 'ALL', search: '' };

function placementCanonical(p) {
  if (!p) return 'Other';
  if (/top.*search/i.test(p) || /^placementTop$/i.test(p)) return 'TOS';
  if (/product.*page/i.test(p) || /detail.*page/i.test(p) || /productPage/i.test(p)) return 'PDP';
  if (/rest.*search/i.test(p) || /^placementRestOfSearch$/i.test(p)) return 'ROS';
  return p;
}
function placementColor(p) {
  const c = placementCanonical(p);
  return { TOS:'#B45309', ROS:'#BE123C', PDP:'#9F1239' }[c] || '#475569';
}
