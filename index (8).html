function asinAggAll(win) {
  // Returns Map<asin, { sp_spend, sp_sales, sd_spend, sd_sales, total_spend, total_sales, orders, units, impr, clicks }>
  const out = new Map();
  function ensure(asin) {
    if (!out.has(asin)) out.set(asin, { spSpend:0,spSales:0,sdSpend:0,sdSales:0,or:0,un:0,im:0,ck:0 });
    return out.get(asin);
  }
  for (const r of (DS.spAsin[win] || [])) {
    if (!r.asin) continue;
    const o = ensure(r.asin);
    o.spSpend += Number(r.sp) || 0;
    o.spSales += Number(r.sl) || 0;
    o.or += Number(r.or) || 0;
    o.un += Number(r.un) || 0;
    o.im += Number(r.im) || 0;
    o.ck += Number(r.ck) || 0;
  }
  for (const r of (DS.sdAsin[win] || [])) {
    if (!r.asin) continue;
    const o = ensure(r.asin);
    o.sdSpend += Number(r.sp) || 0;
    o.sdSales += Number(r.sl) || 0;
    o.or += Number(r.or) || 0;
    o.un += Number(r.un) || 0;
    o.im += Number(r.im) || 0;
    o.ck += Number(r.ck) || 0;
  }
  return out;
}

  // SP_ASIN / SD_ASIN only have MTD and PMTD windows; no L7D/P7D in this export

  // BR sales by ASIN for ad contribution calculation
  const brByAsin = new Map();
  for (const r of (DS.br['mtd'] || [])) {
    const a = r.asin || r.pasin;
    if (!a) continue;
    brByAsin.set(a, (brByAsin.get(a) || 0) + (Number(r.sl) || 0));

    const m = adsP.get(asin);

    const meta = DS.asinByAsin.get(asin) || {};
    const totalSpend = m.spSpend + m.sdSpend;
    const totalSales = m.spSales + m.sdSales;
    const pTotalSpend = p.spSpend + p.sdSpend;
    const pTotalSales = p.spSales + p.sdSales;
    const acos = totalSales ? totalSpend/totalSales : null;

function renderSbDelta() {
  const el = document.getElementById('tab-sbdelta');
  const sbTypes = new Set(['SB','SBV','SB2']);
  const sbRows = (DS.ce.mtd || []).filter(r => {
    const m = DS.campByName.get(r.cn) || {};
    const tp = m.tp || r.tp;
    return tp && sbTypes.has(tp);
  });
  const sbRowsP = (DS.ce.pmtd || []).filter(r => {
    const m = DS.campByName.get(r.cn) || {};
    const tp = m.tp || r.tp;
    return tp && sbTypes.has(tp);
  });
  const totalCESpend = (DS.ce.mtd || []).reduce((s,r) => s + (r.sp || 0), 0);
  const totalCESales = (DS.ce.mtd || []).reduce((s,r) => s + (r.sl || 0), 0);
  const sbSpend = sbRows.reduce((s,r) => s + (r.sp || 0), 0);
  const sbSales = sbRows.reduce((s,r) => s + (r.sl || 0), 0);
  const sbSpendP = sbRowsP.reduce((s,r) => s + (r.sp || 0), 0);

function renderRecon() {
  const el = document.getElementById('tab-recon');
  // Compute reconciliation for MTD
  function recon(win) {
    const ceTotal = { spend:0, sales:0 };
    for (const r of (DS.ce[win] || [])) {
      ceTotal.spend += Number(r.sp) || 0;
      ceTotal.sales += Number(r.sl) || 0;
    }
    const spAsin = { spend:0, sales:0 };
    for (const r of (DS.spAsin[win] || [])) {
      spAsin.spend += Number(r.sp) || 0;
      spAsin.sales += Number(r.sl) || 0;
    }
    const sdAsin = { spend:0, sales:0 };
    for (const r of (DS.sdAsin[win] || [])) {
      sdAsin.spend += Number(r.sp) || 0;
      sdAsin.sales += Number(r.sl) || 0;
    }
    const sbTypes = new Set(['SB','SBV','SB2']);
    const sb = { spend:0, sales:0 };
    for (const r of (DS.ce[win] || [])) {
      const m = DS.campByName.get(r.cn) || {};
      if (sbTypes.has(m.tp || r.tp)) {
        sb.spend += Number(r.sp) || 0;
        sb.sales += Number(r.sl) || 0;
      }
    }
    const reconSpend = spAsin.spend + sdAsin.spend + sb.spend;
    const reconSales = spAsin.sales + sdAsin.sales + sb.sales;
    return { ceTotal, spAsin, sdAsin, sb, reconSpend, reconSales,
      spendGap: ceTotal.spend - reconSpend,
      salesGap: ceTotal.sales - reconSales };
  }

  function panelHtml(title, ce, sp, sd, sb, total, gap, fmt, fld) {
    // Relative tolerance: 0.5% of CE total, or ₹500 minimum
    const tolerance = Math.max(500, ce * 0.005);
    const isOk = Math.abs(gap) < tolerance;
    const gapPct = ce ? (gap / ce * 100) : 0;
    return `<div class="section">
      <div class="section-header">
        <div>
          <div class="section-title">${title}</div>
        </div>
        <div class="section-subtitle">Validates CE total = SP ASIN + SD ASIN + SB Delta · tolerance ±0.5%</div>
      </div>
      <div class="recon-rows">
        <div class="recon-row"><div class="rr-label">CE Total ${fld === 'spend' ? 'Spend' : 'Sales'} (all campaigns)${infoI("From Campaign Explorer, summed across all campaign types")}</div><div class="rr-value rr-strong">${fmt(ce)}</div></div>
        <div class="recon-row"><div class="rr-label">SP ASIN Report${infoI("Sponsored Products at ASIN level")}</div><div class="rr-value" style="color:var(--blue)">${fmt(sp)}</div></div>
        <div class="recon-row"><div class="rr-label">SD ASIN Report${infoI("Sponsored Display at ASIN level")}</div><div class="rr-value" style="color:var(--orchid)">${fmt(sd)}</div></div>
        <div class="recon-row"><div class="rr-label">SB Campaign (unattributed delta)${infoI("SB campaigns have no ASIN-level breakdown — appears here as a single bucket")}</div><div class="rr-value" style="color:var(--pink)">${fmt(sb)}</div></div>
        <div class="recon-row rr-divider"><div class="rr-label"><strong>Reconciliation Total (SP + SD + SB)</strong></div><div class="rr-value rr-strong">${fmt(total)}</div></div>
        <div class="recon-row"><div class="rr-label">Gap (CE Total − Recon Total)</div><div class="rr-value" style="color:${isOk?'var(--green)':'var(--pink)'};font-weight:700">${fmt(Math.abs(gap))} <span style="font-size:11px;font-family:var(--mono);opacity:0.7;font-weight:600">(${gapPct.toFixed(3)}%)</span></div></div>
      </div>
      <div class="recon-banner ${isOk?'ok':'bad'}">
        ${isOk ? '✅ RECONCILED — All ' + fld + ' accounted for within ±0.5% tolerance' : '⚠️ MISMATCH — ' + fld + ' differs by ' + fmt(Math.abs(gap)) + ' (' + gapPct.toFixed(2) + '%)'}
      </div>
    </div>`;
  }

  const m = recon('mtd');
  el.innerHTML = `
    <div class="section-toolbar">
      <span class="label">Reconciliation — MTD</span>
    </div>
    ${panelHtml('Spend Reconciliation — MTD', m.ceTotal.spend, m.spAsin.spend, m.sdAsin.spend, m.sb.spend, m.reconSpend, m.spendGap, fmtINR, 'spend')}
    ${panelHtml('Sales Reconciliation — MTD', m.ceTotal.sales, m.spAsin.sales, m.sdAsin.sales, m.sb.sales, m.reconSales, m.salesGap, fmtINR, 'sales')}
  `;
}

            ${numCell(r.or||0, fmtNum(r.or||0))}
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;

  openModal({
    title: 'SB Delta — Summary',
    subtitle: `${sbRows.length} Sponsored Brands campaigns · ${fmtINR(sbSpend)} spend · ${fmtPct(sbSpend/totalCESpend, 1)} of total CE Spend lacks ASIN-level attribution`,
    body: kpisHtml + reconHtml + barsHtml + tableHtml,
    afterMount: overlay => {
      makeSortable(overlay.querySelector('#sbSummaryTable'));
    },
  });
}

// ============================================================
// BOOTSTRAP — wire tabs, upload, and initial render
// ============================================================

function activateTab(name) {
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + name));
  // Lazy render heavier tabs
  switch (name) {
    case 'overview':  renderOverview(); break;
    case 'br':        renderBrAnalysis && renderBrAnalysis(); break;
    case 'campaigns': renderCampaigns  && renderCampaigns();  break;
    case 'bleed':     renderBleed      && renderBleed();      break;
    case 'str':       renderStr        && renderStr();        break;
    case 'placement': renderPlacement  && renderPlacement();  break;
    case 'asin':      renderAsin       && renderAsin();       break;
    case 'sbdelta':   renderSbDelta    && renderSbDelta();    break;
    case 'recon':     renderRecon      && renderRecon();      break;
  }
}

function wireTabs() {
  document.querySelectorAll('.tab').forEach(b => {
    b.addEventListener('click', () => activateTab(b.dataset.tab));
  });
}

function renderDateStrip() {
  document.getElementById('dt-mtd').textContent  = fmtDateRange(DS.windows.MTD);
  document.getElementById('dt-pmtd').textContent = fmtDateRange(DS.windows.PMTD);
  document.getElementById('dt-l7d').textContent  = fmtDateRange(DS.windows.L7D);
  document.getElementById('dt-p7d').textContent  = fmtDateRange(DS.windows.P7D);
}

// ============================================================
// UPLOAD: replace data with new xlsx of same shape
// ============================================================
function wireUpload() {
  const input = document.getElementById('fileInput');
  input.addEventListener('change', async e => {
    const f = e.target.files[0];
    if (!f) return;
    document.getElementById('loader').style.display = 'flex';
    document.getElementById('loader').innerHTML = '<span>Parsing uploaded file<span class="dots"></span></span>';
    try {
      const buf = await f.arrayBuffer();
      const wb = XLSX.read(buf, { type: 'array', cellDates: true });
      const raw = parseUploadedWb(wb);
      ingestData(raw);
      renderDateStrip();
      // Re-render current tab
      const active = document.querySelector('.tab.active');
      if (active) activateTab(active.dataset.tab);
      document.getElementById('loader').style.display = 'none';
      // Dismiss landing overlay if still visible
      dismissLanding();
    } catch (err) {
      console.error(err);
      document.getElementById('loader').innerHTML = '<span style="color:var(--pink)">Upload failed: ' + escapeHtml(err.message) + '</span>';
      setTimeout(() => document.getElementById('loader').style.display = 'none', 2500);
    }
  });
}

// Convert a SheetJS workbook to the columnar JSON shape ingestData expects.
function parseUploadedWb(wb) {
  // Column-name aliases from upload source -> compact keys (mirror Python)
  const ALIAS = {
    'Campaign name':'cn','Campaign Name':'cn','Campaign':'cn',
    'Type':'tp','Targeting':'tg','Match type':'mt','Match Type':'mt',
    'BCG':'bcg','Category':'cat','Sub category':'scat','Sub Category':'scat',
    'Status':'st','Portfolio name':'pf','Ad Group Name':'ag',
    'Customer Search Term':'q','Search Term Impression Rank':'ir','Search Term Impression Share':'is',
    'Impressions':'im','Clicks':'ck','Spend':'sp','Total cost':'sp',
    'CTR':'ctr','Click-Through Rate (CTR)':'ctr','Click-Thru Rate (CTR)':'ctr',
    'CPC':'cpc','Cost Per Click (CPC)':'cpc',
    'Sales':'sl','14 Day Total Sales':'sl','14 Day Total Sales (₹)':'sl',
    '14 Day Total Orders (#)':'or','Purchases':'or',
    '14 Day Total Units (#)':'un',
    'ACOS':'ac','Total Advertising Cost of Sales (ACOS)':'ac',
    'ROAS':'ro','Total Return on Advertising Spend (ROAS)':'ro',
    '14 Day Conversion Rate':'cr',
    'Advertised ASIN':'asin','ASIN':'asin','(Parent) ASIN':'pasin','(Child) ASIN':'asin',
    'Title':'tt','SP':'sprice','MRP':'mrp','SKU':'sku','Pack Size':'pk','Seller':'slr',
    'www.amazon.in/dp/':'url',
    'Top-of-search impression share':'tosis',
    'Detail page views':'dpv','Brand Store page views':'bspv',
    '14 Day Detail Page Views (DPV)':'dpv',
    'Viewable Impressions':'vim','Cost per 1,000 viewable impressions (VCPM)':'vcpm',
    '14 Day New-to-brand Orders (#)':'ntbo','14 Day New-to-brand Sales':'ntbs',
    'Purchases (new to brand)':'ntbo','Sales (new to brand)':'ntbs',
    'Percent of purchases new to brand':'ntbop','Percent of sales new to brand':'ntbsp',
    'Placement':'pl','Bidding strategy':'bs',
    'Sessions - Total':'ses','Page Views - Total':'pv',
    'Featured Offer Percentage':'fb','Units Ordered':'un',
    'Unit Session Percentage':'usp','Ordered Product Sales':'sl',
    'Total Order Items':'or','Campaign bid strategy':'bid',
    'Campaign budget amount':'bud',
    'Start Date':'sd','End Date':'ed',
    'Campaign start date':'cstart','Campaign end date':'cend',
  };
  const out = { _meta: { brand: 'Ace Blend', currency: 'INR' } };

  function readSheet(name, keepCols) {
    if (!wb.SheetNames.includes(name)) return { c: [], r: [] };
    const ws = wb.Sheets[name];
    const records = XLSX.utils.sheet_to_json(ws, { defval: null, raw: true });
    // Map keys to aliases and prune empties
    const cols = new Set();
    const rows = records.map(rec => {
      const o = {};
      for (const k of keepCols) {
        if (!(k in rec)) continue;
        let v = rec[k];
        if (v === null || v === '' || v === 0) continue;
        const aliasK = ALIAS[k] || k;
        // Coerce dates
        if (v instanceof Date) v = v.toISOString();
        o[aliasK] = v;
        cols.add(aliasK);
      }
      return o;
    }).filter(o => Object.keys(o).length > 0);
    // Stable column order
    const colArr = [...cols];
    return { c: colArr, r: rows.map(o => colArr.map(c => o[c] ?? null)) };
  }

  out.ASIN_MAPPER = readSheet('ASIN_MAPPER', ['ASIN','SKU','Title','SP','MRP','Status','Category','Sub Category','Pack Size','Seller','www.amazon.in/dp/']);
  out.CAMPAIGN_MAPPER = readSheet('CAMPAIGN_MAPPER', ['Campaign','Type','Targeting','Match type','BCG','Sub category','Category','ASIN']);
  out.SBV_MAPPER = readSheet('SBV_MAPPER', ['Campaign','ASIN','Type','Category']);

  const CE_KEEP = ['Campaign name','Status','Type','Targeting','Portfolio name','Campaign bid strategy','Campaign budget amount','Impressions','Top-of-search impression share','Clicks','CTR','Total cost','CPC','Detail page views','Purchases','Sales','ACOS','ROAS','Purchases (new to brand)','Percent of purchases new to brand','Sales (new to brand)','Percent of sales new to brand'];
  const STR_KEEP = ['Start Date','End Date','Customer Search Term','Search Term Impression Rank','Search Term Impression Share','Targeting','Match Type','Portfolio name','Campaign Name','Clicks','Impressions','Click-Through Rate (CTR)','Spend','Cost Per Click (CPC)','14 Day Total Orders (#)','14 Day Total Sales','14 Day Total Sales (₹)','Total Advertising Cost of Sales (ACOS)','Total Return on Advertising Spend (ROAS)','14 Day Conversion Rate'];
  const SP_ASIN_KEEP = ['Portfolio name','Campaign Name','Ad Group Name','Advertised ASIN','Impressions','Clicks','Click-Thru Rate (CTR)','Cost Per Click (CPC)','Spend','14 Day Total Sales','Total Advertising Cost of Sales (ACOS)','Total Return on Advertising Spend (ROAS)','14 Day Total Orders (#)','14 Day Total Units (#)','14 Day Conversion Rate'];
  const SD_ASIN_KEEP = ['Portfolio name','Campaign Name','Ad Group Name','Advertised ASIN','Impressions','Viewable Impressions','Clicks','Click-Thru Rate (CTR)','14 Day Detail Page Views (DPV)','Spend','Cost Per Click (CPC)','Cost per 1,000 viewable impressions (VCPM)','Total Advertising Cost of Sales (ACOS)','Total Return on Advertising Spend (ROAS)','14 Day Total Orders (#)','14 Day Total Units (#)','14 Day Total Sales','14 Day New-to-brand Orders (#)','14 Day New-to-brand Sales'];
  const PL_KEEP = ['Portfolio name','Campaign Name','Bidding strategy','Placement','Impressions','Clicks','Cost Per Click (CPC)','Spend','14 Day Total Sales (₹)','Total Advertising Cost of Sales (ACOS)','Total Return on Advertising Spend (ROAS)','14 Day Total Orders (#)','14 Day Total Units (#)'];
  const BR_KEEP = ['(Parent) ASIN','(Child) ASIN','Title','Sessions - Total','Page Views - Total','Featured Offer Percentage','Units Ordered','Unit Session Percentage','Ordered Product Sales','Total Order Items'];

  for (const s of ['CE_MTD','CE_PMTD','CE_L7D','CE_P7D']) out[s] = readSheet(s, CE_KEEP);
  for (const s of ['SP_STR_IS_MTD','SP_STR_IS_PMTD','SB_STR_IS_MTD','SB_STR_IS_PMTD']) out[s] = readSheet(s, STR_KEEP);
  for (const s of ['SP_ASIN_MTD','SP_ASIN_PMTD']) out[s] = readSheet(s, SP_ASIN_KEEP);
  for (const s of ['SD_ASIN_MTD','SD_ASIN_PMTD']) out[s] = readSheet(s, SD_ASIN_KEEP);
  for (const s of ['PLACEMENT_MTD','PLACEMENT_PMTD']) out[s] = readSheet(s, PL_KEEP);
  for (const s of ['BR_MTD','BR_PMTD','BR_L7D','BR_P7D']) out[s] = readSheet(s, BR_KEEP);

  return out;
}

// ============================================================
// Stub renderers for tabs not yet built (Phase 2+)
// ============================================================
function stubTab(id, label) {
  return `<div class="section" style="text-align:center;padding:60px 28px">
    <div class="section-title title-em-rule" style="margin-bottom:14px">${label}</div>
    <p style="color:var(--ink-mute);max-width:520px;margin:0 auto 20px;font-size:13.5px">
      This tab is queued for the next build phase. The data layer underneath is ready (mappers, joins, and aggregations all compute) — this is only the rendering layer.
    </p>
    <span class="pill sm" style="background:var(--tint-amber);color:#B45309">In next phase</span>
  </div>`;
}
// All tab renderers are now defined in js_overview.js, js_phase2.js, and js_phase34.js

// ============================================================
// BOOT
// ============================================================
(async function boot() {
  try {
    const raw = await decodeEmbedded();
    ingestData(raw);
    renderDateStrip();
    wireTabs();
    wireUpload();
    // Wire export button
    const exportBtn = document.getElementById('exportBtn');
    if (exportBtn) exportBtn.addEventListener('click', exportStandaloneHTML);
    document.getElementById('loader').style.display = 'none';
    // Pre-render Overview but keep it hidden behind landing overlay
    renderOverview();
    // Show landing overlay first
    const lastRun = fmtDateRange(DS.windows.MTD) || 'embedded sample';
    showLandingOverlay(lastRun, null, () => {
      // user picked "continue with last run" — dashboard is already rendered behind, just dismiss
    });
  } catch (e) {
    console.error(e);
    document.getElementById('loader').innerHTML = '<span style="color:var(--pink);font-size:16px">Boot failed: ' + e.message + '</span>';
  }
})();

</script>
